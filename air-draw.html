<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Draw — 手势隔空作画</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ========== 全局重置与基础样式 ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0A0A1A;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        /* Aurora 极光背景动画层 */
        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 60%, #5D34D0 0%, transparent 55%),
                radial-gradient(ellipse at 75% 25%, #FF006E 0%, transparent 55%),
                radial-gradient(ellipse at 50% 85%, #00F0FF 0%, transparent 55%),
                radial-gradient(ellipse at 85% 70%, #5D34D0 0%, transparent 40%);
            animation: auroraDrift 50s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes auroraDrift {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(3%, -2%) rotate(2deg) scale(1.08); }
            50% { transform: translate(-1%, 3%) rotate(-1deg) scale(1.04); }
            75% { transform: translate(2%, 1%) rotate(1.5deg) scale(1.06); }
        }

        /* ========== 主容器 ========== */
        #app-container {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        /* ========== 视频元素（隐藏，仅供给 MediaPipe） ========== */
        #camera-video {
            position: absolute;
            visibility: hidden;
        }

        /* ========== 摄像头画面展示层 ========== */
        #video-display {
            position: absolute;
            display: block;
            pointer-events: none;
            transform: scaleX(-1);
            object-fit: contain;
        }

        /* ========== 绘图 Canvas ========== */
        #drawing-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            transform: scaleX(-1);
        }

        /* ========== 花草 Canvas（持久动画层） ========== */
        #flora-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 12;
            transform: scaleX(-1);
        }

        /* ========== 粒子 Canvas ========== */
        #particle-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            transform: scaleX(-1);
        }

        /* ========== 加载遮罩 ========== */
        #loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(10, 10, 26, 0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            transition: opacity 0.5s;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.12);
            border-top-color: #FF006E;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 状态角标（左上角） ========== */
        #status-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: rgba(30, 12, 60, 0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 0, 110, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.9rem;
            line-height: 1.6;
            min-width: 160px;
            transition: all 0.3s;
            box-shadow: 0 0 24px rgba(255, 0, 110, 0.12), 0 0 8px rgba(0, 240, 255, 0.06);
        }
        #status-badge .gesture-name {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
        }
        #status-badge .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 0 6px currentColor;
        }
        #status-badge .flora-indicator {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 4px;
        }
        #status-badge .flora-on {
            background: rgba(0, 240, 255, 0.18);
            color: #00F0FF;
        }
        #status-badge .flora-off {
            background: rgba(255,255,255,0.08);
            color: #999;
        }

        /* ========== 控制面板（右上角） ========== */
        #control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 101;
            background: rgba(30, 12, 60, 0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 0, 110, 0.25);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 200px;
            color: #fff;
            font-size: 0.85rem;
            box-shadow: 0 0 24px rgba(255, 0, 110, 0.1);
        }
        #control-panel label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #control-panel input[type="color"] {
            width: 100%;
            height: 36px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            padding: 2px;
        }
        #control-panel input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        #control-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FF006E;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 12px rgba(255, 0, 110, 0.5);
        }
        #control-panel input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.7);
        }
        #control-panel button {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: #ddd;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        #control-panel button:hover {
            background: rgba(255, 0, 110, 0.12);
            border-color: rgba(255, 0, 110, 0.4);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.2);
            transform: scale(1.02);
        }
        #control-panel button:active {
            transform: scale(0.96);
        }
        #control-panel button:active {
            transform: scale(0.96);
        }
        #clear-btn { border-color: rgba(255,107,107,0.5) !important; }
        #clear-btn:hover { background: rgba(255,107,107,0.2) !important; }
        #undo-btn { border-color: rgba(255,193,7,0.5) !important; }
        #undo-btn:hover { background: rgba(255,193,7,0.2) !important; }
        #save-btn { border-color: rgba(0,206,118,0.5) !important; }
        #save-btn:hover { background: rgba(0,206,118,0.2) !important; }
        #camera-btn { border-color: rgba(108,92,231,0.5) !important; }
        #camera-btn:hover { background: rgba(108,92,231,0.2) !important; }

        /* ========== 笔刷选择器 ========== */
        #brush-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        #brush-selector .brush-btn {
            padding: 6px 10px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1 1 auto;
            min-width: 44px;
            text-align: center;
        }
        #brush-selector .brush-btn:hover {
            background: rgba(255,255,255,0.14);
            color: #fff;
        }
        #brush-selector .brush-btn.active {
            background: rgba(255, 0, 110, 0.28);
            border-color: rgba(255, 0, 110, 0.65);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 0 14px rgba(255, 0, 110, 0.35);
        }

        /* ========== 手势提示卡（底部居中） ========== */
        #gesture-hints {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(30, 12, 60, 0.78);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 0, 110, 0.2);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            gap: 16px;
            color: #bbb;
            font-size: 0.78rem;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.08);
        }
        #gesture-hints span {
            white-space: nowrap;
            transition: all 0.3s;
        }
        #gesture-hints span.active {
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 14px rgba(255, 0, 110, 0.9), 0 0 4px rgba(255, 255, 255, 0.5);
        }

        /* ========== 响应式：窄屏适配 ========== */
        @media (max-width: 600px) {
            #control-panel {
                top: auto;
                bottom: 80px;
                right: 8px;
                min-width: 150px;
                padding: 10px;
                gap: 6px;
            }
            #control-panel button {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
            #status-badge {
                top: 8px;
                left: 8px;
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            #gesture-hints {
                gap: 10px;
                padding: 6px 14px;
                font-size: 0.7rem;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== 主容器 ========== -->
    <div id="app-container">

        <video id="camera-video" playsinline autoplay muted></video>
        <canvas id="video-display"></canvas>
        <canvas id="drawing-canvas"></canvas>
        <canvas id="flora-canvas"></canvas>
        <canvas id="particle-canvas"></canvas>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <div id="loading-text">正在加载手势识别模型…</div>
        </div>

        <div id="status-badge">
            <div class="gesture-name" id="gesture-label">等待启动</div>
            <div><span class="color-dot" id="color-dot"></span> <span id="color-label">—</span>
                <span class="flora-indicator flora-off" id="flora-indicator">🌿 普通</span>
            </div>
            <div id="fps-label">FPS: --</div>
        </div>

        <div id="control-panel">
            <label for="color-picker">🎨 画笔颜色</label>
            <input type="color" id="color-picker" value="#ff0000">
            <label for="brush-size">📏 笔刷大小: <span id="brush-size-label">8</span></label>
            <input type="range" id="brush-size" min="1" max="40" value="8" step="0.5">
            <label>🖌️ 笔刷样式</label>
            <div id="brush-selector">
                <button data-brush="standard" class="brush-btn active">标准</button>
                <button data-brush="calligraphy" class="brush-btn">毛笔</button>
                <button data-brush="marker" class="brush-btn">马克笔</button>
                <button data-brush="sketch" class="brush-btn">素描</button>
                <button data-brush="oil" class="brush-btn">油画</button>
            </div>
            <button id="clear-btn">🧹 清空画布</button>
            <button id="undo-btn">↩ 撤销一笔</button>
            <button id="save-btn">💾 保存图片</button>
            <button id="camera-btn">📷 启动摄像头</button>
        </div>

        <div id="gesture-hints">
            <span data-gesture="draw">☝️ 绘画</span>
            <span data-gesture="lift">🤏 抬笔</span>
            <span data-gesture="flora">👌 花草</span>
            <span data-gesture="undo">✌️ 撤销</span>
            <span data-gesture="cycle">🖐️ 换色</span>
        </div>
    </div>

    <script type="module">
        // ============================================================
        //  Air Draw — 手势隔空作画互动网页
        //  基于 MediaPipe HandLandmarker + 粒子拖尾 + 花草生长特效
        // ============================================================

        import {
            FilesetResolver,
            HandLandmarker
        } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';

        // ============================================================
        //  配置常量
        // ============================================================
        const CONFIG = {
            colors: ['#FF0000', '#00FF00', '#0000FF', '#800080', '#FFA500'],
            baseStrokeWidth: 5,
            minStrokeWidth: 1.5,
            maxStrokeWidth: 14,
            speedFactor: 0.8,
            maxSpeed: 3.0,
            debounceFrames: 1,
            pinchThreshold: 0.06,
            maxParticles: 800,
            particleDensity: 1.6,
            cameraWidth: { ideal: 1920 },
            cameraHeight: { ideal: 1080 },
            gestureCooldown: 400,  // 离散手势冷却间隔（ms），防止连撤等问题
            discreteGestureDebounce: 3, // 离散手势需连续多少帧确认，防止单帧误识别
            // 手部深度感应：用手掌大小（手腕到中指根距离）推算手离摄像头远近
            depthHandSizeMin: 0.06,   // 手很远时的手掌尺寸
            depthHandSizeMax: 0.42,   // 手很近时的手掌尺寸
        };

        const FLORA_CONFIG = {
            maxElements: 350,
            maxCompleted: 600,        // completed 列表上限，超出时淘汰最旧的
            spawnDensity: 12,
            stemMin: 10,
            stemMax: 50,
            petalSizeMin: 3.0,
            petalSizeMax: 7.0,
            leafCountMin: 1,
            leafCountMax: 4,
            // 5 种植物类型权重
            typeWeights: [0.28, 0.25, 0.15, 0.17, 0.15], // rose, daisy, tulip, fern, vine
            leafColors: [
                '#1B5E20','#2E7D32','#388E3C','#43A047','#4CAF50',
                '#558B2F','#33691E','#689F38','#7CB342','#8BC34A',
                '#2E8B57','#3CB371','#228B22','#006400','#1E8449',
            ],
            stemColors: [
                '#2E7D32','#1B5E20','#388E3C','#4A7C3F','#3D6B35',
                '#556B2F','#5D7A3A','#33691E','#3E6B27','#4A7A2E',
            ],
        };

        // ============================================================
        //  DOM 引用
        // ============================================================
        const appContainer = document.getElementById('app-container');
        const cameraVideo = document.getElementById('camera-video');
        const videoDisplay = document.getElementById('video-display');
        const videoDisplayCtx = videoDisplay.getContext('2d');
        const drawingCanvas = document.getElementById('drawing-canvas');
        const drawingCtx = drawingCanvas.getContext('2d');
        const floraCanvas = document.getElementById('flora-canvas');
        const floraCtx = floraCanvas.getContext('2d');
        const particleCanvas = document.getElementById('particle-canvas');
        const particleCtx = particleCanvas.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const gestureLabel = document.getElementById('gesture-label');
        const colorDot = document.getElementById('color-dot');
        const colorLabel = document.getElementById('color-label');
        const floraIndicator = document.getElementById('flora-indicator');
        const fpsLabel = document.getElementById('fps-label');
        const colorPicker = document.getElementById('color-picker');
        const gestureHintSpans = document.querySelectorAll('#gesture-hints span');

        // ============================================================
        //  手势分类器
        // ============================================================
        const GestureClassifier = (() => {
            const L = {
                WRIST: 0, THUMB_CMC: 1, THUMB_MCP: 2, THUMB_IP: 3, THUMB_TIP: 4,
                INDEX_MCP: 5, INDEX_PIP: 6, INDEX_DIP: 7, INDEX_TIP: 8,
                MIDDLE_MCP: 9, MIDDLE_PIP: 10, MIDDLE_DIP: 11, MIDDLE_TIP: 12,
                RING_MCP: 13, RING_PIP: 14, RING_DIP: 15, RING_TIP: 16,
                PINKY_MCP: 17, PINKY_PIP: 18, PINKY_DIP: 19, PINKY_TIP: 20,
            };

            function dist(a, b) {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            function isFingerExtended(landmarks, tipIdx, pipIdx, mcpIdx) {
                const tip = landmarks[tipIdx];
                const pip = landmarks[pipIdx];
                const mcp = landmarks[mcpIdx];
                // 基础 Y 轴检查：指尖必须在 PIP 和 MCP 之上
                if (!(tip.y < pip.y && tip.y < mcp.y)) return false;
                // 骨骼比例检查：伸展的手指 tip→pip 距离近似 pip→mcp 距离
                // 弯曲的手指 tip→pip 距离明显更短（指尖折向关节，2D 投影收缩）
                const tipToPip = dist(tip, pip);
                const pipToMcp = dist(pip, mcp);
                return tipToPip > pipToMcp * 0.55;
            }

            function isFingerCurled(landmarks, tipIdx, pipIdx) {
                return landmarks[tipIdx].y > landmarks[pipIdx].y;
            }

            function isThumbExtended(landmarks) {
                const tipDist = dist(landmarks[L.THUMB_TIP], landmarks[L.INDEX_MCP]);
                const ipDist = dist(landmarks[L.THUMB_IP], landmarks[L.INDEX_MCP]);
                return tipDist > ipDist * 1.3;
            }

            /**
             * 优先级：OK（花草）→ 五指（换色）→ 捏合（抬笔）→ 中指（撤销）→ 食指（绘画）→ 无手势
             */
            function classify(landmarks) {
                if (!landmarks || landmarks.length < 21) {
                    return { gesture: 'idle', pointer: null };
                }

                const indexUp = isFingerExtended(landmarks, L.INDEX_TIP, L.INDEX_PIP, L.INDEX_MCP);
                const middleUp = isFingerExtended(landmarks, L.MIDDLE_TIP, L.MIDDLE_PIP, L.MIDDLE_MCP);
                const ringUp = isFingerExtended(landmarks, L.RING_TIP, L.RING_PIP, L.RING_MCP);
                const pinkyUp = isFingerExtended(landmarks, L.PINKY_TIP, L.PINKY_PIP, L.PINKY_MCP);
                const thumbUp = isThumbExtended(landmarks);

                const pinchDist = dist(landmarks[L.THUMB_TIP], landmarks[L.INDEX_TIP]);
                const isPinching = pinchDist < CONFIG.pinchThreshold;

                const pointer = {
                    x: landmarks[L.INDEX_TIP].x,
                    y: landmarks[L.INDEX_TIP].y,
                };
                // 手部深度：用手掌大小（手腕→中指根）推算距离
                const handSize = dist(landmarks[L.WRIST], landmarks[L.MIDDLE_MCP]);

                // 1. OK 手势 → 切换花草模式（不再清屏）
                if (isPinching && middleUp && ringUp && pinkyUp) {
                    return { gesture: 'flora', pointer, handSize };
                }

                // 2. 五指张开 → 换色
                if (thumbUp && indexUp && middleUp && ringUp && pinkyUp) {
                    return { gesture: 'cycle', pointer, handSize };
                }

                // 3. 捏合 → 抬笔
                if (isPinching && !middleUp && !ringUp && !pinkyUp) {
                    return { gesture: 'lift', pointer, handSize };
                }
                // 兜底捏合：排除明确的绘画姿态（食指伸展+其余收起），防止绘画时拇指误靠近食指
                if (isPinching && !(indexUp && !middleUp && !ringUp && !pinkyUp)) {
                    return { gesture: 'lift', pointer, handSize };
                }

                // 4. 食指+中指同时举起 → 撤销 (✌️)
                // ★ 中指必须"明确"伸展——不只是被食指带动而轻微翘起
                // 要求中指指尖高于 PIP 的距离 > PIP→MCP 高度的 35%
                const midPipToMcpY = Math.abs(landmarks[L.MIDDLE_MCP].y - landmarks[L.MIDDLE_PIP].y);
                const midTipAbovePip = landmarks[L.MIDDLE_PIP].y - landmarks[L.MIDDLE_TIP].y;
                const middleClearlyUp = middleUp && midTipAbovePip > midPipToMcpY * 0.35;
                if (indexUp && middleClearlyUp && !ringUp && !pinkyUp) {
                    return { gesture: 'undo', pointer, handSize };
                }

                // 6. 仅食指伸出 → 绘画
                if (indexUp && !middleUp && !ringUp && !pinkyUp) {
                    return { gesture: 'draw', pointer, handSize };
                }

                return { gesture: 'idle', pointer, handSize };
            }

            return { classify, L };
        })();

        // ============================================================
        //  笔划类
        // ============================================================
        class Stroke {
            constructor(color, brushType) {
                this.color = color;
                this.brushType = brushType;
                /** @type {{x:number, y:number, width:number, angle:number, jx:number, jy:number, depth:number}[]} */
                this.points = [];
            }
        }

        // ============================================================
        //  绘图引擎 — 支持 5 种笔刷样式
        // ============================================================
        class DrawingEngine {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.strokes = [];
                this.currentStroke = null;
                this.currentColorIdx = 0;
                this.manualColor = null;
                this.baseWidth = CONFIG.baseStrokeWidth;
                this.brushType = 'standard';
                /** 当前手的深度因子 (0=远, 1=近) */
                this.depthFactor = 0.5;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
            }

            get currentColor() {
                return this.manualColor || CONFIG.colors[this.currentColorIdx];
            }

            setBrushType(type) {
                this.endStroke();
                this.brushType = type;
            }

            setDepthFactor(v) {
                this.depthFactor = Math.max(0, Math.min(1, v));
            }

            addPoint(x, y, speed, prevX, prevY) {
                if (!this.currentStroke) {
                    this.currentStroke = new Stroke(this.currentColor, this.brushType);
                }
                const width = this.calcWidth(speed);
                let angle = 0;
                if (prevX !== undefined && prevY !== undefined) {
                    const dx = x - prevX;
                    const dy = y - prevY;
                    if (Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001) {
                        angle = Math.atan2(dy, dx);
                    }
                }
                // 素描笔刷：抖动幅度随深度变化（手近→抖动小=精细，手远→抖动大=粗犷）
                const jitterAmp = this.brushType === 'sketch' ? (2.5 - this.depthFactor * 1.8) : 1.8;
                const jx = (Math.random() - 0.5) * jitterAmp;
                const jy = (Math.random() - 0.5) * jitterAmp;
                this.currentStroke.points.push({ x, y, width, angle, jx, jy, depth: this.depthFactor });
                this.renderLastSegment();
            }

            calcWidth(speed) {
                const cs = Math.max(0, Math.min(speed, CONFIG.maxSpeed));
                let baseW = Math.max(
                    CONFIG.minStrokeWidth,
                    Math.min(CONFIG.maxStrokeWidth,
                        this.baseWidth / (1 + cs * CONFIG.speedFactor)
                    )
                );
                // 深度影响宽度：手近→宽，手远→窄
                const depthMult = 0.55 + this.depthFactor * 1.0;
                switch (this.brushType) {
                    case 'oil':
                        baseW *= (1.5 + this.depthFactor * 2.0); // 1.5x~3.5x 厚涂
                        break;
                    case 'calligraphy':
                        baseW *= (0.7 + this.depthFactor * 1.3); // 0.7x~2.0x
                        break;
                    case 'marker':
                        baseW *= 0.85; // 等宽，基本不变
                        break;
                    case 'sketch':
                        baseW = Math.min(baseW * depthMult, 4.0); // 细线，最粗 4px
                        break;
                    default:
                        baseW *= depthMult;
                        break;
                }
                return baseW;
            }

            setBaseWidth(w) {
                this.baseWidth = w;
                this.endStroke();
            }

            // ── 渲染分发 ──
            renderLastSegment() {
                const pts = this.currentStroke.points;
                if (pts.length < 2) return;
                this._renderSegment(this.ctx, this.currentStroke, pts.length - 1);
            }

            _renderSegment(ctx, stroke, i) {
                const pts = stroke.points;
                if (i < 1) return;
                const bt = stroke.brushType || 'standard';
                switch (bt) {
                    case 'calligraphy': this._renderCalligraphySeg(ctx, stroke, i); break;
                    case 'marker':      this._renderMarkerSeg(ctx, stroke, i); break;
                    case 'sketch':      this._renderSketchSeg(ctx, stroke, i); break;
                    case 'oil':         this._renderOilSeg(ctx, stroke, i); break;
                    default:            this._renderStandardSeg(ctx, stroke, i); break;
                }
            }

            // ── 标准笔刷：平滑均匀，深度影响宽度和透明度 ──
            _renderStandardSeg(ctx, stroke, i) {
                const pts = stroke.points;
                const p0 = pts[i - 1], p1 = pts[i];
                const d = p1.depth !== undefined ? p1.depth : 0.5;
                const alpha = 0.75 + d * 0.25; // 0.75~1.0
                ctx.strokeStyle = stroke.color;
                ctx.lineWidth = p1.width;
                ctx.globalAlpha = alpha;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // ── 毛笔笔刷：方向感知 + 深浅变化（核心：深度→颜色浓淡） ──
            _renderCalligraphySeg(ctx, stroke, i) {
                const pts = stroke.points;
                const p0 = pts[i - 1], p1 = pts[i];
                const d = p1.depth !== undefined ? p1.depth : 0.5;
                const angle = p1.angle || 0;
                // 方向因子：垂直于笔锋方向(水平)粗，平行方向(垂直)细
                const dirFactor = 0.25 + 0.75 * Math.abs(Math.sin(angle));
                const w = Math.max(0.4, p1.width * dirFactor);
                // ★ 核心：深度→颜色浓淡 ★
                // 手近(d→1)：颜色深、饱和度高、宽度大
                // 手远(d→0)：颜色浅、像淡墨、宽度小
                const colorHsl = hexToHsl(stroke.color);
                const lightness = 20 + d * 55;               // 20%~75% 亮度
                const saturation = 30 + d * 70;              // 30%~100% 饱和度
                const depthColor = `hsl(${colorHsl.h}, ${saturation}%, ${lightness}%)`;
                const alpha = 0.55 + d * 0.45;               // 0.55~1.0
                ctx.strokeStyle = depthColor;
                ctx.lineWidth = w;
                ctx.globalAlpha = alpha;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.stroke();
                // 墨迹洇开效果：手近时更大更明显的墨点
                const inkAlpha = 0.08 + d * 0.25;
                const inkRadius = w * (0.25 + d * 0.55);
                ctx.globalAlpha = inkAlpha;
                ctx.fillStyle = depthColor;
                ctx.beginPath();
                ctx.arc(p1.x, p1.y, inkRadius, 0, Math.PI * 2);
                ctx.fill();
                // 额外微小墨点飞溅（手近时更多）
                if (d > 0.4) {
                    const splatterCount = Math.floor(d * 3);
                    for (let s = 0; s < splatterCount; s++) {
                        const sx = p1.x + (Math.random() - 0.5) * w * 1.8;
                        const sy = p1.y + (Math.random() - 0.5) * w * 1.8;
                        ctx.globalAlpha = 0.06 + d * 0.14;
                        ctx.beginPath();
                        ctx.arc(sx, sy, w * (0.08 + Math.random() * 0.25), 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;
            }

            // ── 马克笔笔刷：等宽半透明叠加，深度→不透明度 ──
            _renderMarkerSeg(ctx, stroke, i) {
                const pts = stroke.points;
                const p0 = pts[i - 1], p1 = pts[i];
                const d = p1.depth !== undefined ? p1.depth : 0.5;
                // 等宽：基本忽略速度，宽度恒定
                const w = Math.max(1.2, this.baseWidth * (0.7 + d * 0.6));
                // ★ 核心：深度→不透明度 ★ 手近浓，手远淡
                const alpha = 0.15 + d * 0.50;               // 0.15~0.65
                ctx.strokeStyle = stroke.color;
                ctx.lineWidth = w;
                ctx.globalAlpha = alpha;
                ctx.lineCap = 'butt';    // 平头→马克笔特征
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.stroke();
                // 两端加深：模拟马克笔在起笔/收笔处墨水积聚
                if (i % 4 === 0) {
                    ctx.globalAlpha = alpha * 0.7;
                    ctx.fillStyle = stroke.color;
                    ctx.beginPath();
                    ctx.arc(p1.x, p1.y, w * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // ── 素描笔刷：抖动细线 + 排线纹理，深度→线条密度和暗度 ──
            _renderSketchSeg(ctx, stroke, i) {
                const pts = stroke.points;
                const p0 = pts[i - 1], p1 = pts[i];
                const d = p1.depth !== undefined ? p1.depth : 0.5;
                const w = Math.max(0.4, Math.min(p1.width, 3.5));
                // ★ 核心：深度→颜色暗度 ★
                const colorHsl = hexToHsl(stroke.color);
                const lightness = 15 + d * 65;               // 15%~80%
                const sketchColor = `hsl(${colorHsl.h}, ${colorHsl.s * 0.6}%, ${lightness}%)`;
                const alpha = 0.45 + d * 0.55;               // 0.45~1.0
                ctx.strokeStyle = sketchColor;
                ctx.lineWidth = w;
                ctx.globalAlpha = alpha;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                // 主线（带强烈抖动）
                const ox0 = p0.x + p0.jx, oy0 = p0.y + p0.jy;
                const ox1 = p1.x + p1.jx, oy1 = p1.y + p1.jy;
                ctx.beginPath();
                ctx.moveTo(ox0, oy0);
                ctx.lineTo(ox1, oy1);
                ctx.stroke();
                // ★ 排线：手近→多层排线（深阴影），手远→单线（浅草稿）★
                const hatchCount = d > 0.6 ? 3 : (d > 0.3 ? 2 : 1);
                const perpAngle = (p1.angle || 0) + Math.PI / 2;
                for (let h = 0; h < hatchCount; h++) {
                    const offset = w * (0.6 + h * 0.9);
                    const ha = alpha * (0.15 + d * 0.18);
                    ctx.globalAlpha = ha;
                    ctx.lineWidth = w * (0.25 + d * 0.2);
                    ctx.beginPath();
                    ctx.moveTo(
                        ox0 + Math.cos(perpAngle) * offset + (Math.random() - 0.5) * 1.5,
                        oy0 + Math.sin(perpAngle) * offset + (Math.random() - 0.5) * 1.5
                    );
                    ctx.lineTo(
                        ox1 + Math.cos(perpAngle) * offset + (Math.random() - 0.5) * 1.5,
                        oy1 + Math.sin(perpAngle) * offset + (Math.random() - 0.5) * 1.5
                    );
                    ctx.stroke();
                    // 反向排线增加交叉纹理
                    if (h === 1 && d > 0.5) {
                        const off2 = -offset * 0.7;
                        ctx.beginPath();
                        ctx.moveTo(ox0 + Math.cos(perpAngle) * off2, oy0 + Math.sin(perpAngle) * off2);
                        ctx.lineTo(ox1 + Math.cos(perpAngle) * off2, oy1 + Math.sin(perpAngle) * off2);
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1;
            }

            // ── 油画笔刷：厚涂堆积 + 色相偏移，深度→颜料厚度 ──
            _renderOilSeg(ctx, stroke, i) {
                const pts = stroke.points;
                const p0 = pts[i - 1], p1 = pts[i];
                const d = p1.depth !== undefined ? p1.depth : 0.5;
                const w = Math.max(1, p1.width);
                // ★ 深度→颜料厚度（宽度大幅变化）★
                const thicknessMult = 0.6 + d * 2.4;         // 0.6~3.0
                const thickW = w * thicknessMult;
                // 色相偏移模拟调色板混合
                const hueShift = (Math.sin(i * 0.35) * 5 + (d - 0.5) * 8);
                const oilColor = this._shiftHue(stroke.color, hueShift);
                // 不透明度变化：手近时更厚重
                const alpha = 0.6 + d * 0.4;                 // 0.6~1.0
                ctx.strokeStyle = oilColor;
                ctx.lineWidth = thickW;
                ctx.globalAlpha = alpha * (0.8 + Math.random() * 0.2);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.stroke();
                // ★ 颜料团块：手近→大块堆积，手远→轻薄 ★
                const blobInterval = d > 0.5 ? 2 : (d > 0.25 ? 3 : 5);
                if (i % blobInterval === 0) {
                    const blobAlpha = 0.15 + d * 0.40;       // 0.15~0.55
                    const blobSize = thickW * (0.35 + d * 0.8);
                    ctx.globalAlpha = blobAlpha;
                    // 主色块
                    ctx.fillStyle = this._shiftHue(stroke.color, hueShift + 2);
                    ctx.beginPath();
                    ctx.arc(p1.x, p1.y, blobSize, 0, Math.PI * 2);
                    ctx.fill();
                    // 高光点缀（手近时）
                    if (d > 0.55) {
                        ctx.globalAlpha = blobAlpha * 0.5;
                        ctx.fillStyle = this._shiftHue(stroke.color, hueShift - 4);
                        ctx.beginPath();
                        ctx.arc(
                            p1.x + (Math.random() - 0.5) * thickW * 0.6,
                            p1.y + (Math.random() - 0.5) * thickW * 0.6,
                            blobSize * 0.45, 0, Math.PI * 2
                        );
                        ctx.fill();
                    }
                }
                // 额外纹理：细线模拟画笔鬃毛痕迹
                if (i % 6 === 0 && d > 0.4) {
                    ctx.globalAlpha = alpha * 0.2;
                    ctx.strokeStyle = this._shiftHue(stroke.color, hueShift - 6);
                    ctx.lineWidth = thickW * 0.15;
                    ctx.beginPath();
                    ctx.moveTo(
                        p0.x + (Math.random() - 0.5) * thickW * 0.5,
                        p0.y + (Math.random() - 0.5) * thickW * 0.5
                    );
                    ctx.lineTo(
                        p1.x + (Math.random() - 0.5) * thickW * 0.5,
                        p1.y + (Math.random() - 0.5) * thickW * 0.5
                    );
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
            }

            // 辅助：微调色相
            _shiftHue(hex, degrees) {
                const hsl = hexToHsl(hex);
                return `hsl(${(hsl.h + degrees + 360) % 360}, ${hsl.s}%, ${hsl.l}%)`;
            }

            endStroke() {
                if (this.currentStroke && this.currentStroke.points.length > 1) {
                    this.strokes.push(this.currentStroke);
                }
                this.currentStroke = null;
            }

            undoLastStroke() {
                this.currentStroke = null;
                if (this.strokes.length > 0) this.strokes.pop();
                this.redrawAll();
            }

            clearAll() {
                this.currentStroke = null;
                this.strokes = [];
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            cycleColor() {
                this.currentColorIdx = (this.currentColorIdx + 1) % CONFIG.colors.length;
                this.manualColor = null;
                this.endStroke();
            }

            setManualColor(hex) {
                this.manualColor = hex;
                this.endStroke();
            }

            redrawAll() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (const stroke of this.strokes) {
                    const pts = stroke.points;
                    if (pts.length < 2) continue;
                    for (let i = 1; i < pts.length; i++) {
                        this._renderSegment(this.ctx, stroke, i);
                    }
                }
            }

            exportImage(bgColor = '#0A0A1A') {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = this.canvas.width;
                tempCanvas.height = this.canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.fillStyle = bgColor;
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                tempCtx.drawImage(this.canvas, 0, 0);
                return tempCanvas.toDataURL('image/png');
            }
        }

        // ============================================================
        //  颜色工具：Hex → HSL
        // ============================================================
        function hexToHsl(hex) {
            hex = hex.replace(/^#/, '');
            const r = parseInt(hex.substring(0, 2), 16) / 255;
            const g = parseInt(hex.substring(2, 4), 16) / 255;
            const b = parseInt(hex.substring(4, 6), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        // ============================================================
        //  花草元素 — 写实风格单株植物（5 种类型）
        //  类型：0=玫瑰, 1=雏菊, 2=郁金香, 3=蕨叶, 4=藤蔓
        // ============================================================
        class FloraElement {
            constructor() {
                this.alive = false;
                this.leaves = [];
                this.petals = [];
                this.fernLeaflets = [];
            }

            reset(x, y, strokeColor) {
                this.alive = true;
                this.x = x;
                this.y = y;
                this.growth = 0;
                this.growthSpeed = 0.004 + Math.random() * 0.01;
                this.stemHeight = FLORA_CONFIG.stemMin + Math.random() * (FLORA_CONFIG.stemMax - FLORA_CONFIG.stemMin);
                this.stemAngle = (Math.random() - 0.5) * 0.5;
                this.stemCurve = (Math.random() - 0.5) * 0.35;
                this.stemWidth = 1.2 + Math.random() * 1.6;

                // 按权重选择植物类型
                const tw = FLORA_CONFIG.typeWeights;
                const r = Math.random();
                let acc = 0;
                this.plantType = 0;
                for (let i = 0; i < tw.length; i++) { acc += tw[i]; if (r < acc) { this.plantType = i; break; } }

                const hsl = hexToHsl(strokeColor);
                this.flowerHue = (hsl.h + (Math.random() - 0.5) * 40 + 360) % 360;
                this.flowerSat = 50 + Math.random() * 35;
                this.flowerLight = 45 + Math.random() * 30;
                // 花色微调（每片花瓣略有不同）
                this.petalHueVar = (Math.random() - 0.5) * 15;

                const lc = FLORA_CONFIG.leafColors;
                this.leafColor = lc[Math.floor(Math.random() * lc.length)];
                this.stemColor = FLORA_CONFIG.stemColors[Math.floor(Math.random() * FLORA_CONFIG.stemColors.length)];
                // 第二片叶色（微调用于层次感）
                this.leafColor2 = lc[Math.floor(Math.random() * lc.length)];

                // ---- 类型特定数据 ----
                this.leafCount = FLORA_CONFIG.leafCountMin + Math.floor(Math.random() * (FLORA_CONFIG.leafCountMax - FLORA_CONFIG.leafCountMin + 1));
                this.leaves = [];
                for (let i = 0; i < this.leafCount; i++) {
                    this.leaves.push({
                        t: 0.22 + (i / (this.leafCount + 1)) * 0.58,
                        angle: this.stemAngle + (i % 2 === 0 ? 1 : -1) * (0.4 + Math.random() * 0.5),
                        size: 3.0 + Math.random() * 7.0,
                    });
                }

                switch (this.plantType) {
                    case 0: // 玫瑰 — 多层花瓣
                        this.petalLayers = 2 + Math.floor(Math.random() * 2); // 2-3 层
                        this.petalsPerLayer = [];
                        this.petalData = [];
                        for (let lay = 0; lay < this.petalLayers; lay++) {
                            const count = 4 + Math.floor(Math.random() * 3); // 4-6 per layer
                            const radius = 3.0 + Math.random() * 3.5;
                            const layOffset = Math.random() * Math.PI * 2;
                            for (let i = 0; i < count; i++) {
                                this.petalData.push({
                                    layer: lay,
                                    angle: layOffset + (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3,
                                    length: radius + lay * 1.2 + Math.random() * 1.5,
                                    width: 1.5 + lay * 0.4 + Math.random() * 1.0,
                                    hueShift: (Math.random() - 0.5) * 20,
                                    lightShift: lay * 8 + Math.random() * 5,
                                });
                            }
                        }
                        break;
                    case 1: // 雏菊 — 单层放射状花瓣
                        this.daisyPetalCount = 8 + Math.floor(Math.random() * 8);
                        this.daisyPetalLen = 4.0 + Math.random() * 4.5;
                        this.daisyPetalWid = 1.2 + Math.random() * 2.0;
                        this.daisyCenterSize = 1.8 + Math.random() * 2.2;
                        this.petalData = [];
                        const daisyOffset = Math.random() * Math.PI * 2;
                        for (let i = 0; i < this.daisyPetalCount; i++) {
                            this.petalData.push({
                                angle: daisyOffset + (i / this.daisyPetalCount) * Math.PI * 2,
                                length: this.daisyPetalLen + (Math.random() - 0.5) * 1.5,
                                width: this.daisyPetalWid + (Math.random() - 0.5) * 0.8,
                                hueShift: (Math.random() - 0.5) * 12,
                                lightShift: Math.random() * 8,
                            });
                        }
                        break;
                    case 2: // 郁金香 — 杯状 3-4 片包围
                        this.tulipPetalCount = 3 + Math.floor(Math.random() * 2);
                        this.tulipHeight = 6.0 + Math.random() * 6.0;
                        this.tulipWidth = 3.0 + Math.random() * 3.0;
                        this.stemHeight += 6; // 郁金香茎更长
                        this.petalData = [];
                        for (let i = 0; i < this.tulipPetalCount; i++) {
                            this.petalData.push({
                                angle: (i / this.tulipPetalCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.4,
                                tilt: -0.3 + Math.random() * 0.6, // 向外展开角度
                            });
                        }
                        break;
                    case 3: // 蕨叶 — 羽状复叶
                        this.fernFrondCount = 1 + Math.floor(Math.random() * 3);
                        this.fernLeafletCount = 6 + Math.floor(Math.random() * 10);
                        this.fernFrondLen = 12 + Math.random() * 25;
                        this.fernLeaflets = [];
                        for (let f = 0; f < this.fernFrondCount; f++) {
                            const fAngle = this.stemAngle + (f - (this.fernFrondCount - 1) / 2) * 0.25;
                            const fLen = this.fernFrondLen * (0.6 + Math.random() * 0.4);
                            const leafletCount = 4 + Math.floor(Math.random() * 8);
                            for (let i = 0; i < leafletCount; i++) {
                                this.fernLeaflets.push({
                                    frond: f,
                                    frondAngle: fAngle,
                                    frondLen: fLen,
                                    t: 0.15 + (i / (leafletCount + 1)) * 0.7,
                                    size: 2.0 + (1 - i / leafletCount) * 3.5 + Math.random() * 2.0,
                                    side: i % 2 === 0 ? 1 : -1,
                                });
                            }
                        }
                        break;
                    case 4: // 藤蔓 — 卷曲茎 + 小叶子
                        this.vineCurls = 2 + Math.floor(Math.random() * 3);
                        this.vineLen = 15 + Math.random() * 30;
                        this.vineLeaves = [];
                        for (let i = 0; i < 4 + Math.floor(Math.random() * 5); i++) {
                            this.vineLeaves.push({
                                t: 0.1 + Math.random() * 0.8,
                                angle: (Math.random() - 0.5) * 1.2,
                                size: 1.5 + Math.random() * 3.5,
                                side: Math.random() < 0.5 ? -1 : 1,
                            });
                        }
                        break;
                }
            }

            update(dt) {
                if (!this.alive) return;
                this.growth += this.growthSpeed;
                if (this.growth >= 1) this.growth = 1;
            }

            // 辅助：画写实叶子（带叶脉）
            _drawLeaf(ctx, x, y, size, angle, color, alpha) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(x, y);
                ctx.rotate(angle);
                // 叶片
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(0, -size);
                ctx.bezierCurveTo(size * 0.45, -size * 0.55, size * 0.35, size * 0.3, 0, size * 0.4);
                ctx.bezierCurveTo(-size * 0.35, size * 0.3, -size * 0.45, -size * 0.55, 0, -size);
                ctx.fill();
                // 叶脉
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.lineWidth = 0.3;
                ctx.beginPath();
                ctx.moveTo(0, -size * 0.9);
                ctx.lineTo(0, size * 0.3);
                ctx.stroke();
                // 细侧脉
                ctx.lineWidth = 0.15;
                for (let v = -1; v <= 1; v += 2) {
                    for (let j = 1; j <= 2; j++) {
                        const vt = -size * 0.2 * j;
                        ctx.beginPath();
                        ctx.moveTo(0, vt);
                        ctx.lineTo(v * size * 0.2 * j * 0.6, vt + size * 0.08);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }

            // 辅助：画花瓣（泪滴/椭圆形状）
            _drawPetal(ctx, x, y, length, width, angle, hue, sat, light, alpha) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(x, y);
                ctx.rotate(angle);
                // 花瓣渐变（基部深 → 尖端浅）
                const grad = ctx.createLinearGradient(0, length * 0.2, 0, -length);
                grad.addColorStop(0, `hsla(${hue}, ${sat}%, ${light - 8}%, 0.95)`);
                grad.addColorStop(0.5, `hsla(${hue}, ${sat}%, ${light}%, 0.9)`);
                grad.addColorStop(1, `hsla(${hue + 5}, ${sat - 5}%, ${light + 10}%, 0.85)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(0, length * 0.1); // 基部
                ctx.bezierCurveTo(width, length * 0.1, width, -length * 0.6, 0, -length); // 右
                ctx.bezierCurveTo(-width, -length * 0.6, -width, length * 0.1, 0, length * 0.1); // 左
                ctx.fill();
                // 花瓣中脉
                ctx.strokeStyle = `hsla(${hue}, ${sat - 10}%, ${light - 5}%, 0.2)`;
                ctx.lineWidth = 0.25;
                ctx.beginPath();
                ctx.moveTo(0, length * 0.05);
                ctx.lineTo(0, -length * 0.8);
                ctx.stroke();
                ctx.restore();
            }

            render(ctx, forceFull = false) {
                if (!this.alive) return;
                const g = forceFull ? 1 : this.growth;
                if (g <= 0.01) return;
                const ease = 1 - Math.pow(1 - g, 3);
                const h = this.stemHeight * ease;
                const a = this.stemAngle;
                const c = this.stemCurve;
                const endX = this.x + Math.sin(a) * h;
                const endY = this.y - Math.cos(a) * h;
                const cpX = this.x + Math.sin(a + c) * h * 0.55;
                const cpY = this.y - Math.cos(a + c) * h * 0.55;
                const alpha = Math.min(1, g * 2.5);

                // ---- 茎（宽度渐变：基部粗→尖端细） ----
                const sw = this.stemWidth * (1 - g * 0.3);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = this.stemColor;
                ctx.lineWidth = Math.max(0.5, sw);
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.stroke();
                // 茎的亮面（高光线，增加立体感）
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = Math.max(0.2, sw * 0.3);
                ctx.beginPath();
                ctx.moveTo(this.x + 0.3, this.y);
                ctx.quadraticCurveTo(cpX + 0.3, cpY, endX + 0.3, endY);
                ctx.stroke();
                ctx.restore();

                // ---- 叶子 ----
                if (g > 0.2) {
                    const leafAlpha = Math.min(1, (g - 0.2) / 0.6) * 0.88;
                    for (const leaf of this.leaves) {
                        const lt = leaf.t;
                        const lx = this.x + Math.sin(a + c * lt * 2) * h * lt;
                        const ly = this.y - Math.cos(a + c * lt * 2) * h * lt;
                        const ls = leaf.size * ease;
                        const lc = leaf.angle < 0 ? this.leafColor : this.leafColor2;
                        this._drawLeaf(ctx, lx, ly, ls, leaf.angle, lc, leafAlpha);
                    }
                }

                if (g < 0.3) return; // 早期只显示茎和叶子

                const pt = this.plantType;

                // ---- 蕨叶（类型 3） ----
                if (pt === 3) {
                    for (const fl of this.fernLeaflets) {
                        const fAngle = fl.frondAngle;
                        const fLen = fl.frondLen * ease;
                        const bx = this.x + Math.sin(fAngle) * h * 0.3;
                        const by = this.y - Math.cos(fAngle) * h * 0.3;
                        const ft = fl.t;
                        const fx = bx + Math.sin(fAngle) * fLen * ft;
                        const fy = by - Math.cos(fAngle) * fLen * ft;
                        const fs = fl.size * ease;
                        const fAlpha = alpha * 0.8;
                        ctx.save();
                        ctx.globalAlpha = fAlpha;
                        ctx.fillStyle = fl.side > 0 ? this.leafColor : this.leafColor2;
                        ctx.beginPath();
                        ctx.ellipse(fx, fy, fs, fs * 0.28, fAngle + fl.side * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                    return;
                }

                // ---- 藤蔓（类型 4） ----
                if (pt === 4) {
                    // 卷曲藤蔓
                    const vl = this.vineLen * ease;
                    const curls = this.vineCurls;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = this.stemColor;
                    ctx.lineWidth = Math.max(0.3, 0.9 * ease);
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    let cx = endX, cy = endY;
                    ctx.moveTo(cx, cy);
                    for (let i = 0; i < curls; i++) {
                        const ct = (i + 1) / curls;
                        const curlR = vl * 0.08 * (1 - ct * 0.7);
                        const curlA = a + ct * Math.PI * 1.5 + (i % 2) * Math.PI;
                        cx += Math.cos(curlA) * curlR * 3;
                        cy -= Math.sin(curlA) * curlR * 3;
                        ctx.quadraticCurveTo(
                            cx + Math.cos(curlA + 1) * curlR, cy - Math.sin(curlA + 1) * curlR,
                            cx, cy
                        );
                    }
                    ctx.stroke();
                    ctx.restore();
                    // 藤蔓小叶
                    for (const vl of this.vineLeaves) {
                        if (g < vl.t + 0.2) continue;
                        const vt = vl.t;
                        const vAlpha = Math.min(1, (g - vt - 0.2) / 0.3) * 0.8;
                        const vx = this.x + Math.sin(a) * h + (endX - this.x - Math.sin(a) * h) * vt + vl.side * 4;
                        const vy = this.y - Math.cos(a) * h + (endY - this.y + Math.cos(a) * h) * vt;
                        const vs = vl.size * ease;
                        ctx.save();
                        ctx.globalAlpha = vAlpha;
                        ctx.fillStyle = vl.side > 0 ? this.leafColor : this.leafColor2;
                        // 心形小叶
                        ctx.beginPath();
                        ctx.moveTo(vx, vy - vs);
                        ctx.bezierCurveTo(vx + vs * 0.6, vy - vs * 0.7, vx + vs * 0.6, vy, vx, vy + vs * 0.3);
                        ctx.bezierCurveTo(vx - vs * 0.6, vy, vx - vs * 0.6, vy - vs * 0.7, vx, vy - vs);
                        ctx.fill();
                        ctx.restore();
                    }
                    return;
                }

                if (g < 0.6) return; // 花朵在后期出现

                const bloomRaw = Math.min(1, (g - 0.6) / 0.4);
                const bloom = 1 - Math.pow(1 - bloomRaw, 2);

                // ---- 玫瑰（类型 0） ----
                if (pt === 0) {
                    // 按层排序（内层先画，外层后画包住）
                    const sortedPetals = [...this.petalData].sort((a, b) => b.layer - a.layer);
                    for (const p of sortedPetals) {
                        const pd = p.length * bloom;
                        const pw = p.width * bloom;
                        const pDist = p.layer * 1.5 * bloom;
                        const pAlpha = bloom * 0.9;
                        const px = endX + Math.cos(p.angle) * pDist;
                        const py = endY + Math.sin(p.angle) * pDist;
                        this._drawPetal(ctx, px, py, pd, pw, p.angle + Math.PI * 0.5,
                            this.flowerHue + p.hueShift, this.flowerSat,
                            this.flowerLight + p.lightShift, pAlpha);
                    }
                    // 花心
                    ctx.save();
                    ctx.globalAlpha = bloom;
                    ctx.fillStyle = '#F4C430';
                    ctx.shadowBlur = 2;
                    ctx.shadowColor = 'rgba(244,196,48,0.4)';
                    ctx.beginPath();
                    ctx.arc(endX, endY, 1.8 * bloom, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // ---- 雏菊（类型 1） ----
                if (pt === 1) {
                    for (const p of this.petalData) {
                        const pd = p.length * bloom;
                        const pw = p.width * bloom;
                        const pAlpha = bloom * 0.9;
                        const px = endX + Math.cos(p.angle) * 1.5 * bloom;
                        const py = endY + Math.sin(p.angle) * 1.5 * bloom;
                        this._drawPetal(ctx, px, py, pd, pw, p.angle + Math.PI * 0.5,
                            this.flowerHue + (p.hueShift || 0), this.flowerSat,
                            this.flowerLight + (p.lightShift || 0), pAlpha);
                    }
                    // 花心
                    ctx.save();
                    ctx.globalAlpha = bloom;
                    const dcGrad = ctx.createRadialGradient(endX, endY, 0, endX, endY, this.daisyCenterSize * bloom);
                    dcGrad.addColorStop(0, '#FFE082');
                    dcGrad.addColorStop(0.5, '#FFB300');
                    dcGrad.addColorStop(1, '#E65100');
                    ctx.fillStyle = dcGrad;
                    ctx.beginPath();
                    ctx.arc(endX, endY, this.daisyCenterSize * bloom, 0, Math.PI * 2);
                    ctx.fill();
                    // 花心纹理小点
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    for (let i = 0; i < 5; i++) {
                        const dotA = (i / 5) * Math.PI * 2 + 0.3;
                        const dotR = this.daisyCenterSize * bloom * 0.45;
                        ctx.beginPath();
                        ctx.arc(endX + Math.cos(dotA) * dotR, endY + Math.sin(dotA) * dotR, 0.4 * bloom, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }

                // ---- 郁金香（类型 2） ----
                if (pt === 2) {
                    const th = this.tulipHeight * bloom;
                    const tw = this.tulipWidth * bloom;
                    for (const p of this.petalData) {
                        const pAlpha = bloom * 0.92;
                        ctx.save();
                        ctx.globalAlpha = pAlpha;
                        ctx.translate(endX, endY);
                        ctx.rotate(p.angle);
                        // 郁金香花瓣：从基部向上展开
                        const grad = ctx.createLinearGradient(0, th * 0.3, 0, -th);
                        grad.addColorStop(0, `hsla(${this.flowerHue}, ${this.flowerSat}%, ${this.flowerLight - 10}%, 0.95)`);
                        grad.addColorStop(0.6, `hsla(${this.flowerHue + 5}, ${this.flowerSat}%, ${this.flowerLight + 5}%, 0.9)`);
                        grad.addColorStop(1, `hsla(${this.flowerHue + 10}, ${this.flowerSat - 5}%, ${this.flowerLight + 15}%, 0.8)`);
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.bezierCurveTo(tw * 0.6, -th * 0.3, tw, -th * 0.7, tw * 0.1, -th);
                        ctx.bezierCurveTo(-0.2, -th * 0.8, -0.3, -th * 0.2, 0, 0);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }
        }

        // ============================================================
        //  花草系统 — 管理所有植物 + 烘焙持久化
        // ============================================================
        class FloraSystem {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.pool = [];
                for (let i = 0; i < FLORA_CONFIG.maxElements; i++) {
                    this.pool.push(new FloraElement());
                }
                this.nextSlot = 0;
                /** 已完成生长的植物（序列化数据，用于 redraw/resize 重建） */
                this.completed = [];
            }

            spawn(x, y, color) {
                this.pool[this.nextSlot].reset(x, y, color);
                this.nextSlot = (this.nextSlot + 1) % this.pool.length;
            }

            spawnAlongSegment(x0, y0, x1, y1, color, density = FLORA_CONFIG.spawnDensity) {
                const d = Math.hypot(x1 - x0, y1 - y0);
                const steps = Math.max(1, Math.floor(d / density));
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    this.spawn(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t, color);
                }
            }

            update(dt) {
                for (const f of this.pool) {
                    if (f.alive) f.update(dt);
                }
            }

            /** 将已完成生长的植物烘焙到永久画布，并移到 completed 列表 */
            bakeCompleted(targetCtx) {
                for (const f of this.pool) {
                    if (f.alive && f.growth >= 1) {
                        f.render(targetCtx, true); // forceFull=true: 以完整形态绘制
                        this.completed.push(f);     // 保存引用用于 resize 重建
                        f.alive = false;            // 从动画池移除
                    }
                }
                // 淘汰最旧的已完成植物，防止 completed 数组无限增长导致 resize 卡死
                const maxC = FLORA_CONFIG.maxCompleted;
                if (this.completed.length > maxC) {
                    this.completed.splice(0, this.completed.length - maxC);
                }
            }

            /** 只渲染正在生长的植物到 flora-canvas */
            renderGrowing() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (const f of this.pool) {
                    if (f.alive) f.render(this.ctx, false);
                }
            }

            /** 重绘所有已完成植物（用于 resize 后恢复） */
            rebakeAll(targetCtx) {
                for (const f of this.completed) {
                    f.render(targetCtx, true);
                }
            }

            clear() {
                for (const f of this.pool) f.alive = false;
                this.completed = [];
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // ============================================================
        //  粒子系统
        // ============================================================
        class Particle {
            constructor() {
                this.alive = false;
                this.x = 0; this.y = 0;
                this.vx = 0; this.vy = 0;
                this.life = 0; this.decay = 0;
                this.size = 0;
                this.hue = 0; this.saturation = 0; this.lightness = 0;
                this.hueSpin = 0;
            }

            reset(x, y, color) {
                this.alive = true;
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 3.5;
                this.vy = (Math.random() - 0.5) * 3.0 - 1.5;
                this.life = 1.0;
                this.decay = 0.012 + Math.random() * 0.035;
                this.size = 0.8 + Math.random() * 2.8;
                const baseHsl = hexToHsl(color);
                this.hue = (baseHsl.h + (Math.random() - 0.5) * 70 + 360) % 360;
                this.saturation = 60 + Math.random() * 35;
                this.lightness = 50 + Math.random() * 35;
                this.hueSpin = 0.8 + Math.random() * 3.0;
            }

            update() {
                if (!this.alive) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.012;
                this.life -= this.decay;
                this.size *= 0.998;
                this.hue = (this.hue + this.hueSpin) % 360;
                this.lightness += 0.2;
                if (this.life <= 0) this.alive = false;
            }
        }

        class ParticleSystem {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.pool = [];
                for (let i = 0; i < CONFIG.maxParticles; i++) {
                    this.pool.push(new Particle());
                }
                this.nextSlot = 0;
                this.globalHueShift = 0;
            }

            spawn(x, y, color, count = 2) {
                for (let i = 0; i < count; i++) {
                    this.pool[this.nextSlot].reset(x, y, color);
                    this.nextSlot = (this.nextSlot + 1) % this.pool.length;
                }
            }

            spawnAlongSegment(x0, y0, x1, y1, color, density = CONFIG.particleDensity) {
                const d = Math.hypot(x1 - x0, y1 - y0);
                const steps = Math.max(1, Math.floor(d / density));
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    this.spawn(
                        x0 + (x1 - x0) * t,
                        y0 + (y1 - y0) * t,
                        color, 1
                    );
                }
            }

            update() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.globalHueShift = (this.globalHueShift + 0.35) % 360;
                this.ctx.shadowBlur = 4;
                for (const p of this.pool) {
                    if (!p.alive) continue;
                    p.update();
                    if (!p.alive) continue;
                    const displayHue = (p.hue + this.globalHueShift) % 360;
                    const colorStr = `hsl(${displayHue}, ${p.saturation}%, ${p.lightness}%)`;
                    this.ctx.globalAlpha = p.life;
                    this.ctx.shadowColor = colorStr;
                    this.ctx.fillStyle = colorStr;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                this.ctx.globalAlpha = 1.0;
                this.ctx.shadowBlur = 0;
            }

            clear() {
                for (const p of this.pool) p.alive = false;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // ============================================================
        //  应用主控制器
        // ============================================================
        class AppController {
            constructor() {
                this.drawingEngine = new DrawingEngine(drawingCanvas, drawingCtx);
                this.particleSystem = new ParticleSystem(particleCanvas, particleCtx);
                this.floraSystem = new FloraSystem(floraCanvas, floraCtx);

                this.handLandmarker = null;
                this.cameraStarted = false;
                this.lastVideoTime = -1;
                this.currentGesture = 'idle';
                this.gestureFrameCounts = {};
                this.gestureTriggered = {};

                // 平滑插值（关键：让绘画在 60fps 丝滑运行）
                this.smoothX = 0;
                this.smoothY = 0;
                this.targetX = 0;
                this.targetY = 0;
                this.hasTarget = false;
                this.isDrawing = false;
                this.lastSmoothX = null;
                this.lastSmoothY = null;
                this.lastDetectSpeed = 0;
                this.smoothSpeed = 0;

                // 深度平滑（手离摄像头远近 → 笔刷浓淡/粗细变化）
                this.targetDepth = 0.5;
                this.smoothDepth = 0.5;
                this.lastDetectDepth = 0.5;

                // 花草模式开关
                this.floraMode = false;

                // 手势冷却计时（防止连撤等问题）
                this.lastGestureTriggerTime = {};

                // FPS
                this.frameCount = 0;
                this.lastFpsTime = performance.now();
                this.currentFps = 0;

                // 时间
                this.lastLoopTime = performance.now();

                this.loop = this.loop.bind(this);
            }

            async initMediaPipe() {
                loadingText.textContent = '正在加载 AI 视觉模型…';
                try {
                    const vision = await FilesetResolver.forVisionTasks(
                        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
                    );
                    this.handLandmarker = await HandLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',
                        },
                        runningMode: 'VIDEO',
                        numHands: 1,
                        minHandDetectionConfidence: 0.5,
                        minHandPresenceConfidence: 0.5,
                        minTrackingConfidence: 0.5,
                    });
                    return true;
                } catch (err) {
                    console.error('MediaPipe 初始化失败:', err);
                    loadingText.textContent = '模型加载失败，请检查网络连接后刷新重试。';
                    return false;
                }
            }

            async startCamera() {
                loadingText.textContent = '正在启动摄像头…';
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert('您的浏览器不支持摄像头访问。请使用 Chrome、Edge 或 Firefox 的最新版本。');
                    return false;
                }

                const startStream = async (constraints) => {
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    cameraVideo.srcObject = stream;
                    await cameraVideo.play();
                    this.cameraStarted = true;
                    await new Promise((resolve) => {
                        if (cameraVideo.readyState >= 2) resolve();
                        else cameraVideo.addEventListener('loadedmetadata', resolve, { once: true });
                    });
                    this.resize();
                    loadingOverlay.classList.add('hidden');
                    this.lastLoopTime = performance.now();
                    requestAnimationFrame(this.loop);
                    return true;
                };

                try {
                    return await startStream({
                        video: {
                            width: CONFIG.cameraWidth,
                            height: CONFIG.cameraHeight,
                            facingMode: 'user',
                        },
                    });
                } catch (err) {
                    try {
                        return await startStream({ video: { facingMode: 'user' } });
                    } catch (err2) {
                        loadingText.textContent = '摄像头启动失败。请确认已授权摄像头权限，然后刷新页面重试。';
                        console.error('摄像头启动失败:', err2);
                        return false;
                    }
                }
            }

            resize() {
                const containerW = appContainer.clientWidth;
                const containerH = appContainer.clientHeight;
                const videoW = cameraVideo.videoWidth || 640;
                const videoH = cameraVideo.videoHeight || 480;
                const videoAspect = videoW / videoH;
                const containerAspect = containerW / containerH;

                let drawW, drawH;
                if (containerAspect > videoAspect) {
                    drawH = containerH;
                    drawW = drawH * videoAspect;
                } else {
                    drawW = containerW;
                    drawH = drawW / videoAspect;
                }

                const offsetX = (containerW - drawW) / 2;
                const offsetY = (containerH - drawH) / 2;
                const sizeAndPos = (canvas, w, h) => {
                    canvas.width = w;
                    canvas.height = h;
                    canvas.style.width = w + 'px';
                    canvas.style.height = h + 'px';
                    canvas.style.left = offsetX + 'px';
                    canvas.style.top = offsetY + 'px';
                };

                sizeAndPos(videoDisplay, drawW, drawH);
                sizeAndPos(drawingCanvas, drawW, drawH);
                sizeAndPos(floraCanvas, drawW, drawH);
                sizeAndPos(particleCanvas, drawW, drawH);

                this.drawingEngine.redrawAll();
                // 重绘已烘焙的花草（它们不在 strokes 数组里）
                this.floraSystem.rebakeAll(drawingCtx);
                // 立即重绘生长中的花草，避免 resize 清空后出现空白帧
                this.floraSystem.renderGrowing();
                this.drawSize = { w: drawW, h: drawH, offsetX, offsetY };
            }

            mapToCanvas(np) {
                if (!this.drawSize) return { x: 0, y: 0 };
                return { x: np.x * this.drawSize.w, y: np.y * this.drawSize.h };
            }

            /** 主循环 — 60fps 驱动，含平滑插值 */
            loop(timestamp) {
                // 摄像头未启动时停止循环，避免空转消耗资源
                if (!this.cameraStarted || !this.handLandmarker) return;

                requestAnimationFrame(this.loop);

                // 页面隐藏时跳过计算（浏览器会大幅降低 RAF 频率）
                if (document.hidden) return;

                // 计算帧间隔
                const rawDt = Math.min((timestamp - this.lastLoopTime) / 1000, 0.1); // cap at 100ms
                this.lastLoopTime = timestamp;

                // FPS
                this.frameCount++;
                if (timestamp - this.lastFpsTime >= 1000) {
                    this.currentFps = Math.round(this.frameCount / ((timestamp - this.lastFpsTime) / 1000));
                    this.frameCount = 0;
                    this.lastFpsTime = timestamp;
                    fpsLabel.textContent = 'FPS: ' + this.currentFps;
                }

                // 渲染摄像头画面
                if (cameraVideo.readyState >= 2) {
                    const sz = this.drawSize;
                    videoDisplayCtx.drawImage(cameraVideo, 0, 0, sz.w, sz.h);
                }

                // 视频帧变化时 → 运行检测
                if (cameraVideo.readyState >= 2 && cameraVideo.currentTime !== this.lastVideoTime) {
                    this.lastVideoTime = cameraVideo.currentTime;
                    let results;
                    try {
                        results = this.handLandmarker.detectForVideo(cameraVideo, performance.now());
                    } catch (e) {
                        console.warn('MediaPipe 检测异常:', e.message || e);
                        results = null;
                    }
                    if (results) {
                        this.processDetection(results, rawDt);
                    }
                }

                // === 平滑插值绘制（每帧执行，无论是否有新检测） ===
                if (this.isDrawing && this.hasTarget) {
                    // 平滑因子：越低越丝滑（0.2-0.4 最佳）
                    const smoothFactor = 0.28;
                    this.smoothX += (this.targetX - this.smoothX) * smoothFactor;
                    this.smoothY += (this.targetY - this.smoothY) * smoothFactor;

                    // 平滑深度（避免突变）
                    this.smoothDepth += (this.targetDepth - this.smoothDepth) * 0.22;

                    if (this.lastSmoothX !== null) {
                        const de = this.drawingEngine;
                        // 平滑速度衰减
                        this.smoothSpeed += (this.lastDetectSpeed - this.smoothSpeed) * smoothFactor;

                        de.setDepthFactor(this.smoothDepth);
                        de.addPoint(this.smoothX, this.smoothY, this.smoothSpeed,
                            this.lastSmoothX, this.lastSmoothY);

                        if (this.floraMode) {
                            this.floraSystem.spawnAlongSegment(
                                this.lastSmoothX, this.lastSmoothY,
                                this.smoothX, this.smoothY,
                                de.currentColor
                            );
                        } else {
                            this.particleSystem.spawnAlongSegment(
                                this.lastSmoothX, this.lastSmoothY,
                                this.smoothX, this.smoothY,
                                de.currentColor
                            );
                        }
                    }

                    this.lastSmoothX = this.smoothX;
                    this.lastSmoothY = this.smoothY;
                }

                // 更新粒子（始终运行，粒子自己会衰减）
                this.particleSystem.update();
                // 更新花草：先烘焙已完成植物到永久画布，再渲染生长中的
                this.floraSystem.update(rawDt);
                this.floraSystem.bakeCompleted(drawingCtx);
                this.floraSystem.renderGrowing();
            }

            /** 处理 MediaPipe 检测结果（仅在视频帧变化时调用） */
            processDetection(results, dt) {
                if (!results.landmarks || results.landmarks.length === 0) {
                    this.onHandLost();
                    return;
                }

                const landmarks = results.landmarks[0];
                const classification = GestureClassifier.classify(landmarks);
                const gesture = classification.gesture;

                // ★ 深度因子：从手部尺寸映射到 0~1（0=远, 1=近）★
                const rawHandSize = classification.handSize || 0.15;
