<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Draw — 手势隔空作画</title>
    <style>
        /* ========== 全局重置与基础样式 ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0d0d0d;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* ========== 主容器 ========== */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* ========== 视频元素（隐藏，仅供给 MediaPipe） ========== */
        #camera-video {
            position: absolute;
            visibility: hidden;
            /* 保持视频用于检测，但不显示 */
        }

        /* ========== 摄像头画面展示层 ========== */
        #video-display {
            position: absolute;
            display: block;
            pointer-events: none;
            /* 镜像翻转（前置摄像头） */
            transform: scaleX(-1);
            object-fit: contain;
        }

        /* ========== 绘图 Canvas（CSS 镜像翻转，与视频展示一致） ========== */
        #drawing-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            transform: scaleX(-1);
        }

        /* ========== 粒子 Canvas（CSS 镜像翻转） ========== */
        #particle-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            transform: scaleX(-1);
        }

        /* ========== 加载遮罩 ========== */
        #loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            transition: opacity 0.5s;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 状态角标（左上角） ========== */
        #status-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.9rem;
            line-height: 1.6;
            min-width: 160px;
            transition: all 0.3s;
        }
        #status-badge .gesture-name {
            font-weight: 700;
            font-size: 1.1rem;
        }
        #status-badge .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* ========== 控制面板（右上角） ========== */
        #control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 101;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 180px;
            color: #fff;
            font-size: 0.85rem;
        }
        #control-panel label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #control-panel input[type="color"] {
            width: 100%;
            height: 36px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            padding: 2px;
        }
        #control-panel button {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        #control-panel button:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.4);
        }
        #control-panel button:active {
            transform: scale(0.96);
        }
        #clear-btn { border-color: rgba(255,107,107,0.5) !important; }
        #clear-btn:hover { background: rgba(255,107,107,0.2) !important; }
        #undo-btn { border-color: rgba(255,193,7,0.5) !important; }
        #undo-btn:hover { background: rgba(255,193,7,0.2) !important; }
        #save-btn { border-color: rgba(0,206,118,0.5) !important; }
        #save-btn:hover { background: rgba(0,206,118,0.2) !important; }
        #camera-btn { border-color: rgba(108,92,231,0.5) !important; }
        #camera-btn:hover { background: rgba(108,92,231,0.2) !important; }

        /* ========== 手势提示卡（底部居中） ========== */
        #gesture-hints {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            gap: 16px;
            color: #ccc;
            font-size: 0.78rem;
            align-items: center;
        }
        #gesture-hints span {
            white-space: nowrap;
            transition: color 0.3s;
        }
        #gesture-hints span.active {
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(108,92,231,0.8);
        }

        /* ========== 响应式：窄屏适配 ========== */
        @media (max-width: 600px) {
            #control-panel {
                top: auto;
                bottom: 80px;
                right: 8px;
                min-width: 150px;
                padding: 10px;
                gap: 6px;
            }
            #control-panel button {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
            #status-badge {
                top: 8px;
                left: 8px;
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            #gesture-hints {
                gap: 10px;
                padding: 6px 14px;
                font-size: 0.7rem;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== 主容器 ========== -->
    <div id="app-container">

        <!-- 隐藏的 video 元素，仅用于 MediaPipe 检测 -->
        <video id="camera-video" playsinline autoplay muted></video>

        <!-- 摄像头画面展示 -->
        <canvas id="video-display"></canvas>

        <!-- 绘图 Canvas（持久笔画） -->
        <canvas id="drawing-canvas"></canvas>

        <!-- 粒子 Canvas（每帧清空） -->
        <canvas id="particle-canvas"></canvas>

        <!-- 加载遮罩 -->
        <div id="loading-overlay">
            <div class="spinner"></div>
            <div id="loading-text">正在加载手势识别模型…</div>
        </div>

        <!-- 状态角标 -->
        <div id="status-badge">
            <div class="gesture-name" id="gesture-label">等待启动</div>
            <div><span class="color-dot" id="color-dot"></span> <span id="color-label">—</span></div>
            <div id="fps-label">FPS: --</div>
        </div>

        <!-- 控制面板 -->
        <div id="control-panel">
            <label for="color-picker">🎨 画笔颜色</label>
            <input type="color" id="color-picker" value="#ff0000">
            <button id="clear-btn">🧹 清空画布</button>
            <button id="undo-btn">↩ 撤销一笔</button>
            <button id="save-btn">💾 保存图片</button>
            <button id="camera-btn">📷 启动摄像头</button>
        </div>

        <!-- 手势提示卡 -->
        <div id="gesture-hints">
            <span data-gesture="draw">☝️ 绘画</span>
            <span data-gesture="lift">🤏 抬笔</span>
            <span data-gesture="clear">👌 清屏</span>
            <span data-gesture="undo">✊ 撤销</span>
            <span data-gesture="cycle">🖐️ 换色</span>
        </div>
    </div>

    <!-- ========== 主脚本（ES Module，支持 CDN import） ========== -->
    <script type="module">
        // ============================================================
        //  Air Draw — 手势隔空作画互动网页
        //  基于 MediaPipe HandLandmarker 实现实时手势识别并绘图
        // ============================================================

        // ---------- 从 CDN 加载 MediaPipe Tasks Vision ----------
        import {
            FilesetResolver,
            HandLandmarker
        } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';

        // ============================================================
        //  配置常量
        // ============================================================
        const CONFIG = {
            // 颜色循环列表
            colors: ['#FF0000', '#00FF00', '#0000FF', '#800080', '#FFA500'],
            // 笔画（速度模拟压感：快→细，慢→粗）
            baseStrokeWidth: 5,
            minStrokeWidth: 1.5,
            maxStrokeWidth: 14,
            speedFactor: 1.0, // 压感灵敏度（越大越快变细）
            maxSpeed: 3.0, // 速度上限 px/ms，超过此值统一按最细处理
            // 手势防抖帧数（降低以提高响应速度）
            debounceFrames: 2,
            // 捏合距离阈值（归一化坐标）
            pinchThreshold: 0.06,
            // 粒子
            maxParticles: 800,
            particleDensity: 1.6, // 每像素间距（越小粒子越密集）
            // 摄像头分辨率
            cameraWidth: { ideal: 1920 },
            cameraHeight: { ideal: 1080 },
        };

        // ============================================================
        //  DOM 引用
        // ============================================================
        const appContainer = document.getElementById('app-container');
        const cameraVideo = document.getElementById('camera-video');
        const videoDisplay = document.getElementById('video-display');
        const videoDisplayCtx = videoDisplay.getContext('2d');
        const drawingCanvas = document.getElementById('drawing-canvas');
        const drawingCtx = drawingCanvas.getContext('2d');
        const particleCanvas = document.getElementById('particle-canvas');
        const particleCtx = particleCanvas.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const gestureLabel = document.getElementById('gesture-label');
        const colorDot = document.getElementById('color-dot');
        const colorLabel = document.getElementById('color-label');
        const fpsLabel = document.getElementById('fps-label');
        const colorPicker = document.getElementById('color-picker');
        const gestureHintSpans = document.querySelectorAll('#gesture-hints span');

        // ============================================================
        //  手势分类器（纯函数，无状态）
        //  输入：21 个归一化关键点数组 [{x,y,z}, ...]
        //  输出：{ gesture: 'draw'|'lift'|'clear'|'cycle'|'undo'|'idle',
        //          pointer: {x,y}|null }
        // ============================================================
        const GestureClassifier = (() => {
            // MediaPipe 手部关键点索引
            const L = {
                WRIST: 0,
                THUMB_CMC: 1,
                THUMB_MCP: 2,
                THUMB_IP: 3,
                THUMB_TIP: 4,
                INDEX_MCP: 5,
                INDEX_PIP: 6,
                INDEX_DIP: 7,
                INDEX_TIP: 8,
                MIDDLE_MCP: 9,
                MIDDLE_PIP: 10,
                MIDDLE_DIP: 11,
                MIDDLE_TIP: 12,
                RING_MCP: 13,
                RING_PIP: 14,
                RING_DIP: 15,
                RING_TIP: 16,
                PINKY_MCP: 17,
                PINKY_PIP: 18,
                PINKY_DIP: 19,
                PINKY_TIP: 20,
            };

            /** 两点欧氏距离 */
            function dist(a, b) {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            /**
             * 判断一根手指是否伸直（适用于食指/中指/无名指/小指）
             * 原理：在图像坐标系中，y 轴向下。指尖伸直时 tip.y < pip.y < mcp.y
             */
            function isFingerExtended(landmarks, tipIdx, pipIdx, mcpIdx) {
                const tip = landmarks[tipIdx];
                const pip = landmarks[pipIdx];
                const mcp = landmarks[mcpIdx];
                return tip.y < pip.y && tip.y < mcp.y;
            }

            /**
             * 判断一根手指是否明显卷曲（用于握拳检测）
             * 卷曲时指尖折叠到 PIP 关节下方：tip.y > pip.y
             */
            function isFingerCurled(landmarks, tipIdx, pipIdx) {
                const tip = landmarks[tipIdx];
                const pip = landmarks[pipIdx];
                return tip.y > pip.y;
            }

            /**
             * 判断拇指是否伸直
             * 拇指运动方向偏向水平，不能简单用 y 坐标判断。
             * 改用距离法：拇指尖到食指 MCP 的距离 > 拇指 IP 到食指 MCP 的距离 × 1.3
             */
            function isThumbExtended(landmarks) {
                const thumbTip = landmarks[L.THUMB_TIP];
                const thumbIp = landmarks[L.THUMB_IP];
                const indexMcp = landmarks[L.INDEX_MCP];
                const tipDist = dist(thumbTip, indexMcp);
                const ipDist = dist(thumbIp, indexMcp);
                return tipDist > ipDist * 1.3;
            }

            /**
             * 主分类函数
             * 优先级：OK → 五指 → 捏合 → 握拳 → 食指 → 无手势
             */
            function classify(landmarks) {
                if (!landmarks || landmarks.length < 21) {
                    return { gesture: 'idle', pointer: null };
                }

                // 各手指伸直状态
                const indexUp = isFingerExtended(landmarks, L.INDEX_TIP, L.INDEX_PIP, L.INDEX_MCP);
                const middleUp = isFingerExtended(landmarks, L.MIDDLE_TIP, L.MIDDLE_PIP, L.MIDDLE_MCP);
                const ringUp = isFingerExtended(landmarks, L.RING_TIP, L.RING_PIP, L.RING_MCP);
                const pinkyUp = isFingerExtended(landmarks, L.PINKY_TIP, L.PINKY_PIP, L.PINKY_MCP);
                const thumbUp = isThumbExtended(landmarks);

                // 各手指卷曲状态（正向检测握拳）
                const indexCurled = isFingerCurled(landmarks, L.INDEX_TIP, L.INDEX_PIP);
                const middleCurled = isFingerCurled(landmarks, L.MIDDLE_TIP, L.MIDDLE_PIP);
                const ringCurled = isFingerCurled(landmarks, L.RING_TIP, L.RING_PIP);
                const pinkyCurled = isFingerCurled(landmarks, L.PINKY_TIP, L.PINKY_PIP);
                // 拇指卷曲：拇指尖贴近食指 MCP（距离 < 0.09 归一化单位）
                const thumbToIndexMcp = dist(landmarks[L.THUMB_TIP], landmarks[L.INDEX_MCP]);
                const thumbCurled = thumbToIndexMcp < 0.09;

                // 判断捏合（拇指尖与食指尖距离很小）
                const pinchDist = dist(landmarks[L.THUMB_TIP], landmarks[L.INDEX_TIP]);
                const isPinching = pinchDist < CONFIG.pinchThreshold;

                // 食指指尖坐标（归一化 0-1）
                const pointer = {
                    x: landmarks[L.INDEX_TIP].x,
                    y: landmarks[L.INDEX_TIP].y,
                };

                // ---- 按优先级分类 ----

                // 1. OK 手势：捏合 + 中/无/小三指伸直
                if (isPinching && middleUp && ringUp && pinkyUp) {
                    return { gesture: 'clear', pointer };
                }

                // 2. 五指张开：所有手指伸直
                if (thumbUp && indexUp && middleUp && ringUp && pinkyUp) {
                    return { gesture: 'cycle', pointer };
                }

                // 3. 捏合：拇指+食指靠近，其余手指收拢
                if (isPinching && !middleUp && !ringUp && !pinkyUp) {
                    return { gesture: 'lift', pointer };
                }
                // 也匹配"仅捏合"的情况（其余手指可能部分伸直，但不是全部）
                if (isPinching) {
                    return { gesture: 'lift', pointer };
                }

                // 4. 握拳：所有手指明显卷曲（正向检测，更准确）
                const allCurled = indexCurled && middleCurled && ringCurled && pinkyCurled;
                const noneExtended = !indexUp && !middleUp && !ringUp && !pinkyUp;
                if (allCurled && noneExtended && (thumbCurled || !thumbUp)) {
                    return { gesture: 'undo', pointer };
                }

                // 5. 仅食指伸出：其他手指收拢
                if (indexUp && !middleUp && !ringUp && !pinkyUp) {
                    return { gesture: 'draw', pointer };
                }

                // 6. 未识别
                return { gesture: 'idle', pointer };
            }

            return { classify, L };
        })();

        // ============================================================
        //  笔划类
        //  存储一笔连续线条的所有点
        // ============================================================
        class Stroke {
            constructor(color, baseWidth) {
                this.color = color;
                this.baseWidth = baseWidth;
                /** @type {{x:number, y:number, width:number}[]} */
                this.points = [];
            }
        }

        // ============================================================
        //  绘图引擎
        //  管理所有笔划、渲染到 drawing-canvas
        // ============================================================
        class DrawingEngine {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                /** @type {Stroke[]} 已完成的笔划 */
                this.strokes = [];
                /** @type {Stroke|null} 当前正在绘制的笔划 */
                this.currentStroke = null;
                /** 当前颜色索引（用于手势循环切换） */
                this.currentColorIdx = 0;
                /** 手动选色（优先级高于循环颜色） */
                this.manualColor = null;

                // 初始化画布渲染设置
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
            }

            /** 获取当前实际使用的颜色 */
            get currentColor() {
                return this.manualColor || CONFIG.colors[this.currentColorIdx];
            }

            /** 添加一个点（在主循环中调用） */
            addPoint(x, y, speed) {
                if (!this.currentStroke) {
                    this.currentStroke = new Stroke(this.currentColor, CONFIG.baseStrokeWidth);
                }

                // 速度 → 粗细映射：越快越细
                const width = this.calcWidth(speed);
                this.currentStroke.points.push({ x, y, width });

                // 渲染最近一个线段
                this.renderLastSegment();
            }

            /** 速度 → 笔触宽度（反比关系：越快越细） */
            calcWidth(speed) {
                const clampedSpeed = Math.max(0, Math.min(speed, CONFIG.maxSpeed));
                return Math.max(
                    CONFIG.minStrokeWidth,
                    Math.min(CONFIG.maxStrokeWidth,
                        CONFIG.baseStrokeWidth / (1 + clampedSpeed * CONFIG.speedFactor)
                    )
                );
            }

            /** 渲染当前笔划的最后一个线段（高效增量渲染） */
            renderLastSegment() {
                const pts = this.currentStroke.points;
                if (pts.length < 2) return;

                const p0 = pts[pts.length - 2];
                const p1 = pts[pts.length - 1];

                this.ctx.strokeStyle = this.currentStroke.color;
                this.ctx.lineWidth = p1.width;
                this.ctx.beginPath();
                this.ctx.moveTo(p0.x, p0.y);
                this.ctx.lineTo(p1.x, p1.y);
                this.ctx.stroke();
            }

            /** 结束当前笔划，存入已完成列表 */
            endStroke() {
                if (this.currentStroke && this.currentStroke.points.length > 1) {
                    this.strokes.push(this.currentStroke);
                }
                this.currentStroke = null;
            }

            /** 撤销最后一笔 */
            undoLastStroke() {
                // 先结束当前笔划
                this.currentStroke = null;
                // 弹出最后一笔已完成的笔划
                if (this.strokes.length > 0) {
                    this.strokes.pop();
                }
                // 完全重绘
                this.redrawAll();
            }

            /** 清空所有内容 */
            clearAll() {
                this.currentStroke = null;
                this.strokes = [];
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            /** 循环切换颜色 */
            cycleColor() {
                this.currentColorIdx = (this.currentColorIdx + 1) % CONFIG.colors.length;
                this.manualColor = null; // 手势换色时清除手动选色
                this.endStroke(); // 切换颜色时自动开始新的一笔
            }

            /** 设置手动颜色 */
            setManualColor(hex) {
                this.manualColor = hex;
                this.endStroke(); // 换色时开始新的一笔
            }

            /** 完全重绘所有已完成的笔划 */
            redrawAll() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                for (const stroke of this.strokes) {
                    const pts = stroke.points;
                    if (pts.length < 2) continue;

                    this.ctx.strokeStyle = stroke.color;
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';

                    for (let i = 1; i < pts.length; i++) {
                        this.ctx.lineWidth = pts[i].width;
                        this.ctx.beginPath();
                        this.ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
                        this.ctx.lineTo(pts[i].x, pts[i].y);
                        this.ctx.stroke();
                    }
                }
            }

            /** 将画布导出为 PNG DataURL */
            exportImage(bgColor = '#0d0d0d') {
                // 创建临时画布，加上深色背景
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = this.canvas.width;
                tempCanvas.height = this.canvas.height;
                const tempCtx = tempCanvas.getContext('2d');

                // 背景
                tempCtx.fillStyle = bgColor;
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                // 绘制笔划
                tempCtx.drawImage(this.canvas, 0, 0);

                return tempCanvas.toDataURL('image/png');
            }
        }

        // ============================================================
        //  颜色工具：Hex → HSL（用于粒子色彩变化）
        // ============================================================
        function hexToHsl(hex) {
            hex = hex.replace(/^#/, '');
            const r = parseInt(hex.substring(0, 2), 16) / 255;
            const g = parseInt(hex.substring(2, 4), 16) / 255;
            const b = parseInt(hex.substring(4, 6), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        // ============================================================
        //  粒子系统
        //  管理粒子的生成、更新与渲染
        // ============================================================
        class Particle {
            constructor() {
                this.alive = false;
                this.x = 0;
                this.y = 0;
                this.vx = 0;
                this.vy = 0;
                this.life = 0;
                this.decay = 0;
                this.size = 0;
                /** HSL 颜色分量 */
                this.hue = 0;
                this.saturation = 0;
                this.lightness = 0;
                /** 每个粒子独立的色相旋转速度 */
                this.hueSpin = 0;
            }

            /** 重置粒子状态 */
            reset(x, y, color) {
                this.alive = true;
                this.x = x;
                this.y = y;
                // 更柔和的随机速度，粒子飘散更细腻
                this.vx = (Math.random() - 0.5) * 3.5;
                this.vy = (Math.random() - 0.5) * 3.0 - 1.5;
                this.life = 1.0;
                this.decay = 0.012 + Math.random() * 0.035;
                // 🎨 小颗粒子，精致细腻
                this.size = 0.8 + Math.random() * 2.8;
                // 🎨 相近色搭配：以笔触颜色色相为基准，±35° 范围内变化
                //     红→橙红、蓝→紫蓝、绿→黄绿、紫→粉紫 … 和谐不刺眼
                const baseHsl = hexToHsl(color);
                this.hue = (baseHsl.h + (Math.random() - 0.5) * 70 + 360) % 360;
                // 饱和度保持柔和（不过饱和）
                this.saturation = 60 + Math.random() * 35;
                // 亮度中等偏高，粒子晶莹透亮
                this.lightness = 50 + Math.random() * 35;
                // 缓慢的色相微调（相近色范围内轻柔摆动）
                this.hueSpin = 0.8 + Math.random() * 3.0;
            }

            /** 更新位置与生命值 */
            update() {
                if (!this.alive) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.012; // 更轻的重力
                this.life -= this.decay;
                this.size *= 0.998;
                // 色相在相近色范围内轻柔旋转
                this.hue = (this.hue + this.hueSpin) % 360;
                // 亮度缓慢升高 → 粒子消失前微微发亮
                this.lightness += 0.2;
                if (this.life <= 0) {
                    this.alive = false;
                }
            }
        }

        class ParticleSystem {
            constructor(canvas, ctx, maxParticles = CONFIG.maxParticles) {
                this.canvas = canvas;
                this.ctx = ctx;
                /** 粒子对象池（预分配，避免 GC） */
                this.pool = [];
                for (let i = 0; i < maxParticles; i++) {
                    this.pool.push(new Particle());
                }
                this.nextSlot = 0;
                /** 全局色相偏移，随时间缓慢旋转，让整条拖尾的颜色不断流动 */
                this.globalHueShift = 0;
            }

            /** 在 (x, y) 生成 count 个粒子 */
            spawn(x, y, color, count = 2) {
                for (let i = 0; i < count; i++) {
                    this.pool[this.nextSlot].reset(x, y, color);
                    this.nextSlot = (this.nextSlot + 1) % this.pool.length;
                }
            }

            /**
             * 沿线段 (x0,y0)→(x1,y1) 均匀生成粒子
             * density 控制间距（像素），值越小粒子越密
             */
            spawnAlongSegment(x0, y0, x1, y1, color, density = CONFIG.particleDensity) {
                const d = Math.hypot(x1 - x0, y1 - y0);
                const steps = Math.max(1, Math.floor(d / density));
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const x = x0 + (x1 - x0) * t;
                    const y = y0 + (y1 - y0) * t;
                    this.spawn(x, y, color, 1);
                }
            }

            /** 更新并渲染所有粒子（每帧调用，细腻辉光 + 相近色循环） */
            update() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                // 全局色相缓慢推进 → 相近色范围内轻柔流动
                this.globalHueShift = (this.globalHueShift + 0.35) % 360;
                // 柔和辉光（小粒子配小光晕，更精致）
                this.ctx.shadowBlur = 4;
                for (const p of this.pool) {
                    if (!p.alive) continue;
                    p.update();
                    if (!p.alive) continue;

                    // 粒子自身色相 + 全局偏移 → 双重旋转，色彩不断交替
                    const displayHue = (p.hue + this.globalHueShift) % 360;
                    const colorStr = `hsl(${displayHue}, ${p.saturation}%, ${p.lightness}%)`;
                    this.ctx.globalAlpha = p.life;
                    this.ctx.shadowColor = colorStr;
                    this.ctx.fillStyle = colorStr;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                this.ctx.globalAlpha = 1.0;
                this.ctx.shadowBlur = 0;
            }

            /** 清除所有粒子 */
            clear() {
                for (const p of this.pool) p.alive = false;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // ============================================================
        //  应用主控制器
        // ============================================================
        class AppController {
            constructor() {
                // 初始化各模块
                this.drawingEngine = new DrawingEngine(drawingCanvas, drawingCtx);
                this.particleSystem = new ParticleSystem(particleCanvas, particleCtx);

                // MediaPipe 实例
                this.handLandmarker = null;

                // 状态
                this.cameraStarted = false;
                this.lastVideoTime = -1;
                this.lastPointerPos = null; // 上一帧指尖位置（用于计算速度和画线）
                this.currentGesture = 'idle';
                this.gestureFrameCounts = {}; // 每种手势的连续帧计数
                this.gestureTriggered = {}; // 一次性手势是否已在本轮触发

                // FPS 统计
                this.frameCount = 0;
                this.lastFpsTime = performance.now();
                this.currentFps = 0;

                // 绑定方法
                this.loop = this.loop.bind(this);
            }

            /** 初始化 MediaPipe（可在页面加载时提前调用） */
            async initMediaPipe() {
                loadingText.textContent = '正在加载 AI 视觉模型…';
                try {
                    const vision = await FilesetResolver.forVisionTasks(
                        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
                    );
                    this.handLandmarker = await HandLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',
                        },
                        runningMode: 'VIDEO',
                        numHands: 1,
                        minHandDetectionConfidence: 0.5,
                        minHandPresenceConfidence: 0.5,
                        minTrackingConfidence: 0.5,
                    });
                    return true;
                } catch (err) {
                    console.error('MediaPipe 初始化失败:', err);
                    loadingText.textContent = '模型加载失败，请检查网络连接后刷新重试。';
                    return false;
                }
            }

            /** 启动摄像头 + 开始主循环 */
            async startCamera() {
                loadingText.textContent = '正在启动摄像头…';

                // 检测浏览器支持
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert('您的浏览器不支持摄像头访问。请使用 Chrome、Edge 或 Firefox 的最新版本。');
                    return false;
                }

                const startStream = async (constraints) => {
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    cameraVideo.srcObject = stream;
                    await cameraVideo.play();
                    this.cameraStarted = true;

                    // 视频元数据就绪后自适应尺寸
                    await new Promise((resolve) => {
                        if (cameraVideo.readyState >= 2) resolve();
                        else cameraVideo.addEventListener('loadedmetadata', resolve, { once: true });
                    });

                    this.resize();
                    loadingOverlay.classList.add('hidden');
                    // 启动主循环
                    this.lastFrameStamp = performance.now();
                    requestAnimationFrame(this.loop);
                    return true;
                };

                try {
                    return await startStream({
                        video: {
                            width: CONFIG.cameraWidth,
                            height: CONFIG.cameraHeight,
                            facingMode: 'user',
                        },
                    });
                } catch (err) {
                    // 降级：不指定分辨率
                    try {
                        return await startStream({ video: { facingMode: 'user' } });
                    } catch (err2) {
                        loadingText.textContent = '摄像头启动失败。请确认已授权摄像头权限，然后刷新页面重试。';
                        console.error('摄像头启动失败:', err2);
                        return false;
                    }
                }
            }

            /** 自适应窗口大小，保持视频比例 */
            resize() {
                const containerW = appContainer.clientWidth;
                const containerH = appContainer.clientHeight;

                const videoW = cameraVideo.videoWidth || 640;
                const videoH = cameraVideo.videoHeight || 480;
                const videoAspect = videoW / videoH;
                const containerAspect = containerW / containerH;

                let drawW, drawH;
                if (containerAspect > videoAspect) {
                    // 容器更宽 → 上下留黑边
                    drawH = containerH;
                    drawW = drawH * videoAspect;
                } else {
                    // 容器更高 → 左右留黑边
                    drawW = containerW;
                    drawH = drawW / videoAspect;
                }

                // 定位偏移（居中）
                const offsetX = (containerW - drawW) / 2;
                const offsetY = (containerH - drawH) / 2;

                // 更新视频展示 canvas
                videoDisplay.width = drawW;
                videoDisplay.height = drawH;
                videoDisplay.style.width = drawW + 'px';
                videoDisplay.style.height = drawH + 'px';
                videoDisplay.style.left = offsetX + 'px';
                videoDisplay.style.top = offsetY + 'px';

                // 更新绘图 canvas
                drawingCanvas.width = drawW;
                drawingCanvas.height = drawH;
                drawingCanvas.style.width = drawW + 'px';
                drawingCanvas.style.height = drawH + 'px';
                drawingCanvas.style.left = offsetX + 'px';
                drawingCanvas.style.top = offsetY + 'px';

                // 更新粒子 canvas
                particleCanvas.width = drawW;
                particleCanvas.height = drawH;
                particleCanvas.style.width = drawW + 'px';
                particleCanvas.style.height = drawH + 'px';
                particleCanvas.style.left = offsetX + 'px';
                particleCanvas.style.top = offsetY + 'px';

                // 重绘已有笔画（尺寸变化后坐标不变，因为坐标是相对 Canvas 的）
                this.drawingEngine.redrawAll();

                // 存储当前尺寸和偏移
                this.drawSize = { w: drawW, h: drawH, offsetX, offsetY };
            }

            /**
             * 将 MediaPipe 归一化坐标 (0-1) 映射到 Canvas 像素坐标
             * 注意：所有 Canvas 通过 CSS scaleX(-1) 做视觉镜像翻转，
             * 因此坐标不需要手动镜像，直接映射即可。
             */
            mapToCanvas(normalizedPoint) {
                if (!this.drawSize) return { x: 0, y: 0 };
                return {
                    x: normalizedPoint.x * this.drawSize.w,
                    y: normalizedPoint.y * this.drawSize.h,
                };
            }

            /** 主循环 */
            loop(timestamp) {
                requestAnimationFrame(this.loop);

                if (!this.cameraStarted || !this.handLandmarker) return;

                // FPS 统计
                this.frameCount++;
                if (timestamp - this.lastFpsTime >= 1000) {
                    this.currentFps = Math.round(this.frameCount / ((timestamp - this.lastFpsTime) / 1000));
                    this.frameCount = 0;
                    this.lastFpsTime = timestamp;
                    fpsLabel.textContent = 'FPS: ' + this.currentFps;
                }

                // 渲染摄像头画面到展示 canvas
                if (cameraVideo.readyState >= 2) {
                    const sz = this.drawSize;
                    videoDisplayCtx.drawImage(cameraVideo, 0, 0, sz.w, sz.h);
                }

                // 只有当视频时间戳变化时才进行检测（避免重复检测同一帧）
                if (cameraVideo.readyState >= 2 && cameraVideo.currentTime !== this.lastVideoTime) {
                    this.lastVideoTime = cameraVideo.currentTime;

                    let results;
                    try {
                        results = this.handLandmarker.detectForVideo(cameraVideo, performance.now());
                    } catch (e) {
                        // 检测失败，跳过本帧
                        return;
                    }

                    this.processResults(results, timestamp);
                }

                // 每帧更新粒子动画（无论是否有手）
                this.particleSystem.update();
            }

            /** 处理 MediaPipe 检测结果 */
            processResults(results, loopTimestamp) {
                // 没有检测到手
                if (!results.landmarks || results.landmarks.length === 0) {
                    this.onHandLost();
                    return;
                }

                const landmarks = results.landmarks[0];
                const classification = GestureClassifier.classify(landmarks);
                const gesture = classification.gesture;

                // ---- 防抖处理 ----
                // 重置非当前手势的计数器
                for (const key of Object.keys(this.gestureFrameCounts)) {
                    if (key !== gesture) {
                        this.gestureFrameCounts[key] = 0;
                        this.gestureTriggered[key] = false;
                    }
                }

                // 累加当前手势帧数
                if (!this.gestureFrameCounts[gesture]) this.gestureFrameCounts[gesture] = 0;
                this.gestureFrameCounts[gesture]++;

                // 手势变化时重置触发标记
                if (this.currentGesture !== gesture) {
                    this.gestureTriggered[gesture] = false;
                    this.currentGesture = gesture;
                }

                // 未达到防抖阈值 → 跳过动作执行
                if (this.gestureFrameCounts[gesture] < CONFIG.debounceFrames) {
                    return;
                }

                // ---- 执行手势对应动作 ----
                const pointer = this.mapToCanvas(classification.pointer);
                const colors = CONFIG.colors;
                const de = this.drawingEngine;

                switch (gesture) {
                    case 'draw': {
                        if (this.lastPointerPos) {
                            // 计算指尖移动速度（像素/帧间隔 → 用于压感映射）
                            const pxDist = Math.hypot(
                                pointer.x - this.lastPointerPos.x,
                                pointer.y - this.lastPointerPos.y
                            );
                            const dt = Math.max(8, loopTimestamp - this.lastFrameStamp); // ms
                            const speed = pxDist / dt; // px/ms

                            de.addPoint(pointer.x, pointer.y, speed);

                            // 沿线段生成粒子拖尾
                            this.particleSystem.spawnAlongSegment(
                                this.lastPointerPos.x, this.lastPointerPos.y,
                                pointer.x, pointer.y,
                                de.currentColor
                            );
                        }
                        this.lastPointerPos = pointer;
                        this.lastFrameStamp = loopTimestamp;
                        this.updateUI('draw', '绘画中 ✨');
                        break;
                    }

                    case 'lift':
                        de.endStroke();
                        this.lastPointerPos = null;
                        this.updateUI('lift', '抬笔暂停 ✋');
                        break;

                    case 'clear':
                        if (!this.gestureTriggered.clear) {
                            de.clearAll();
                            this.particleSystem.clear();
                            this.gestureTriggered.clear = true;
                        }
                        this.lastPointerPos = null;
                        this.updateUI('clear', '画布已清除 🧹');
                        break;

                    case 'cycle':
                        if (!this.gestureTriggered.cycle) {
                            de.cycleColor();
                            this.gestureTriggered.cycle = true;
                        }
                        this.lastPointerPos = null;
                        this.updateUI('cycle', '颜色切换 → ' + de.currentColor);
                        break;

                    case 'undo':
                        if (!this.gestureTriggered.undo) {
                            de.undoLastStroke();
                            this.gestureTriggered.undo = true;
                        }
                        this.lastPointerPos = null;
                        this.updateUI('undo', '撤销一笔 ↩');
                        break;

                    default: // idle
                        de.endStroke();
                        this.lastPointerPos = null;
                        this.updateUI('idle', '伸出食指开始绘画 ☝️');
                        break;
                }
            }

            /** 手离开画面时的处理 */
            onHandLost() {
                this.drawingEngine.endStroke();
                this.lastPointerPos = null;
                // 重置所有手势计数
                this.gestureFrameCounts = {};
                this.gestureTriggered = {};
                this.currentGesture = 'idle';
                this.updateUI('idle', '未检测到手 🖐️');
            }

            /** 更新 UI 状态 */
            updateUI(gesture, statusText) {
                gestureLabel.textContent = statusText;

                const de = this.drawingEngine;
                const color = de.currentColor;
                colorDot.style.backgroundColor = color;
                colorLabel.textContent = color;

                // 同步颜色选择器
                if (colorPicker.value !== color) {
                    colorPicker.value = color;
                }

                // 高亮当前手势提示
                gestureHintSpans.forEach(span => {
                    const g = span.dataset.gesture;
                    if (g === gesture) {
                        span.classList.add('active');
                    } else {
                        span.classList.remove('active');
                    }
                });
            }
        }

        // ============================================================
        //  UI 事件绑定
        // ============================================================

        // ============================================================
        //  启动流程
        // ============================================================
        (async function bootstrap() {
            // ---- 自动检测：是否通过 file:// 协议打开 ----
            if (window.location.protocol === 'file:') {
                // 隐藏加载动画
                loadingOverlay.querySelector('.spinner').style.display = 'none';
                // 显示醒目错误提示
                loadingText.innerHTML = `
                    <div style="font-size:1.8rem;margin-bottom:12px;">⚠️ 检测到直接打开文件</div>
                    <div style="color:#ff6b6b;margin-bottom:20px;">摄像头与 AI 模型需要本地服务器环境</div>
                    <div style="background:#1a1a2e;border-radius:10px;padding:16px;text-align:left;line-height:1.8;font-size:0.95rem;max-width:420px;">
                        <div style="color:#6c5ce7;font-weight:700;margin-bottom:8px;">👉 请按以下步骤操作：</div>
                        <div>1️⃣ 找到 <b>start-server.bat</b> 文件</div>
                        <div>2️⃣ <b>双击运行</b>，会自动弹出浏览器</div>
                        <div>3️⃣ 访问 <span style="color:#00ce76;">http://localhost:8000/air-draw.html</span></div>
                    </div>
                    <div style="margin-top:16px;font-size:0.8rem;color:#888;">
                        📁 文件位置：ppt制作 文件夹 → start-server.bat
                    </div>
                `;
                loadingText.style.maxWidth = '460px';
                loadingText.style.textAlign = 'center';
                return; // 停止后续初始化
            }

            // 1. 预加载 MediaPipe 模型（后台进行）
            const mediaPipeReady = app.initMediaPipe().catch(() => false);

            // 2. 显示加载界面，等待用户点击启动摄像头
            loadingText.textContent = '模型加载中，请稍候…';

            // 3. 如果模型先加载好，更新提示
            const mpOk = await mediaPipeReady;
            if (mpOk) {
                loadingText.textContent = '模型就绪！点击 "📷 启动摄像头" 开始';
            } else {
                loadingText.textContent = '模型加载失败，请检查网络后刷新重试';
            }
        })();
