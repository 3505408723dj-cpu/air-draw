<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Draw — 手势隔空作画</title>
    <style>
        /* ========== 全局重置与基础样式 ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0d0d0d;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* ========== 主容器 ========== */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* ========== 视频元素（隐藏，仅供给 MediaPipe） ========== */
        #camera-video {
            position: absolute;
            visibility: hidden;
        }

        /* ========== 摄像头画面展示层 ========== */
        #video-display {
            position: absolute;
            display: block;
            pointer-events: none;
            transform: scaleX(-1);
            object-fit: contain;
        }

        /* ========== 绘图 Canvas ========== */
        #drawing-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            transform: scaleX(-1);
        }

        /* ========== 花草 Canvas（持久动画层） ========== */
        #flora-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 12;
            transform: scaleX(-1);
        }

        /* ========== 粒子 Canvas ========== */
        #particle-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            transform: scaleX(-1);
        }

        /* ========== 加载遮罩 ========== */
        #loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            transition: opacity 0.5s;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 状态角标（左上角） ========== */
        #status-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.9rem;
            line-height: 1.6;
            min-width: 160px;
            transition: all 0.3s;
        }
        #status-badge .gesture-name {
            font-weight: 700;
            font-size: 1.1rem;
        }
        #status-badge .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        #status-badge .flora-indicator {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 4px;
        }
        #status-badge .flora-on {
            background: rgba(76,175,80,0.3);
            color: #81c784;
        }
        #status-badge .flora-off {
            background: rgba(255,255,255,0.1);
            color: #999;
        }

        /* ========== 控制面板（右上角） ========== */
        #control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 101;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 180px;
            color: #fff;
            font-size: 0.85rem;
        }
        #control-panel label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #control-panel input[type="color"] {
            width: 100%;
            height: 36px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            padding: 2px;
        }
        #control-panel button {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        #control-panel button:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.4);
        }
        #control-panel button:active {
            transform: scale(0.96);
        }
        #clear-btn { border-color: rgba(255,107,107,0.5) !important; }
        #clear-btn:hover { background: rgba(255,107,107,0.2) !important; }
        #undo-btn { border-color: rgba(255,193,7,0.5) !important; }
        #undo-btn:hover { background: rgba(255,193,7,0.2) !important; }
        #save-btn { border-color: rgba(0,206,118,0.5) !important; }
        #save-btn:hover { background: rgba(0,206,118,0.2) !important; }
        #camera-btn { border-color: rgba(108,92,231,0.5) !important; }
        #camera-btn:hover { background: rgba(108,92,231,0.2) !important; }

        /* ========== 手势提示卡（底部居中） ========== */
        #gesture-hints {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            gap: 16px;
            color: #ccc;
            font-size: 0.78rem;
            align-items: center;
        }
        #gesture-hints span {
            white-space: nowrap;
            transition: color 0.3s;
        }
        #gesture-hints span.active {
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(108,92,231,0.8);
        }

        /* ========== 响应式：窄屏适配 ========== */
        @media (max-width: 600px) {
            #control-panel {
                top: auto;
                bottom: 80px;
                right: 8px;
                min-width: 150px;
                padding: 10px;
                gap: 6px;
            }
            #control-panel button {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
            #status-badge {
                top: 8px;
                left: 8px;
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            #gesture-hints {
                gap: 10px;
                padding: 6px 14px;
                font-size: 0.7rem;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== 主容器 ========== -->
    <div id="app-container">

        <video id="camera-video" playsinline autoplay muted></video>
        <canvas id="video-display"></canvas>
        <canvas id="drawing-canvas"></canvas>
        <canvas id="flora-canvas"></canvas>
        <canvas id="particle-canvas"></canvas>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <div id="loading-text">正在加载手势识别模型…</div>
        </div>

        <div id="status-badge">
            <div class="gesture-name" id="gesture-label">等待启动</div>
            <div><span class="color-dot" id="color-dot"></span> <span id="color-label">—</span>
                <span class="flora-indicator flora-off" id="flora-indicator">🌿 普通</span>
            </div>
            <div id="fps-label">FPS: --</div>
        </div>

        <div id="control-panel">
            <label for="color-picker">🎨 画笔颜色</label>
            <input type="color" id="color-picker" value="#ff0000">
            <button id="clear-btn">🧹 清空画布</button>
            <button id="undo-btn">↩ 撤销一笔</button>
            <button id="save-btn">💾 保存图片</button>
            <button id="camera-btn">📷 启动摄像头</button>
        </div>

        <div id="gesture-hints">
            <span data-gesture="draw">☝️ 绘画</span>
            <span data-gesture="lift">🤏 抬笔</span>
            <span data-gesture="flora">👌 花草</span>
            <span data-gesture="undo">✊ 撤销</span>
            <span data-gesture="cycle">🖐️ 换色</span>
        </div>
    </div>

    <script type="module">
        // ============================================================
        //  Air Draw — 手势隔空作画互动网页
        //  基于 MediaPipe HandLandmarker + 粒子拖尾 + 花草生长特效
        // ============================================================

        import {
            FilesetResolver,
            HandLandmarker
        } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';

        // ============================================================
        //  配置常量
        // ============================================================
        const CONFIG = {
            colors: ['#FF0000', '#00FF00', '#0000FF', '#800080', '#FFA500'],
            baseStrokeWidth: 5,
            minStrokeWidth: 1.5,
            maxStrokeWidth: 14,
            speedFactor: 0.8,
            maxSpeed: 3.0,
            debounceFrames: 1,
            pinchThreshold: 0.06,
            maxParticles: 800,
            particleDensity: 1.6,
            cameraWidth: { ideal: 1920 },
            cameraHeight: { ideal: 1080 },
        };

        const FLORA_CONFIG = {
            maxElements: 350,
            spawnDensity: 10,
            stemMin: 10,
            stemMax: 45,
            flowerChance: 0.55,
            petalCountMin: 4,
            petalCountMax: 8,
            petalSizeMin: 2.0,
            petalSizeMax: 5.5,
            leafCountMin: 1,
            leafCountMax: 3,
            grassChance: 0.35,
            leafColors: [
                '#228B22','#2E8B57','#3CB371','#66CDAA','#90EE90',
                '#00FA9A','#00FF7F','#7CFC00','#32CD32','#556B2F',
                '#8FBC8F','#20B2AA','#48C9B0','#27AE60','#1E8449',
            ],
        };

        // ============================================================
        //  DOM 引用
        // ============================================================
        const appContainer = document.getElementById('app-container');
        const cameraVideo = document.getElementById('camera-video');
        const videoDisplay = document.getElementById('video-display');
        const videoDisplayCtx = videoDisplay.getContext('2d');
        const drawingCanvas = document.getElementById('drawing-canvas');
        const drawingCtx = drawingCanvas.getContext('2d');
        const floraCanvas = document.getElementById('flora-canvas');
        const floraCtx = floraCanvas.getContext('2d');
        const particleCanvas = document.getElementById('particle-canvas');
        const particleCtx = particleCanvas.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const gestureLabel = document.getElementById('gesture-label');
        const colorDot = document.getElementById('color-dot');
        const colorLabel = document.getElementById('color-label');
        const floraIndicator = document.getElementById('flora-indicator');
        const fpsLabel = document.getElementById('fps-label');
        const colorPicker = document.getElementById('color-picker');
        const gestureHintSpans = document.querySelectorAll('#gesture-hints span');

        // ============================================================
        //  手势分类器
        // ============================================================
        const GestureClassifier = (() => {
            const L = {
                WRIST: 0, THUMB_CMC: 1, THUMB_MCP: 2, THUMB_IP: 3, THUMB_TIP: 4,
                INDEX_MCP: 5, INDEX_PIP: 6, INDEX_DIP: 7, INDEX_TIP: 8,
                MIDDLE_MCP: 9, MIDDLE_PIP: 10, MIDDLE_DIP: 11, MIDDLE_TIP: 12,
                RING_MCP: 13, RING_PIP: 14, RING_DIP: 15, RING_TIP: 16,
                PINKY_MCP: 17, PINKY_PIP: 18, PINKY_DIP: 19, PINKY_TIP: 20,
            };

            function dist(a, b) {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            function isFingerExtended(landmarks, tipIdx, pipIdx, mcpIdx) {
                const tip = landmarks[tipIdx];
                const pip = landmarks[pipIdx];
                const mcp = landmarks[mcpIdx];
                return tip.y < pip.y && tip.y < mcp.y;
            }

            function isFingerCurled(landmarks, tipIdx, pipIdx) {
                return landmarks[tipIdx].y > landmarks[pipIdx].y;
            }

            function isThumbExtended(landmarks) {
                const tipDist = dist(landmarks[L.THUMB_TIP], landmarks[L.INDEX_MCP]);
                const ipDist = dist(landmarks[L.THUMB_IP], landmarks[L.INDEX_MCP]);
                return tipDist > ipDist * 1.3;
            }

            /**
             * 优先级：OK（花草开关）→ 五指 → 捏合 → 握拳 → 食指 → 无手势
             */
            function classify(landmarks) {
                if (!landmarks || landmarks.length < 21) {
                    return { gesture: 'idle', pointer: null };
                }

                const indexUp = isFingerExtended(landmarks, L.INDEX_TIP, L.INDEX_PIP, L.INDEX_MCP);
                const middleUp = isFingerExtended(landmarks, L.MIDDLE_TIP, L.MIDDLE_PIP, L.MIDDLE_MCP);
                const ringUp = isFingerExtended(landmarks, L.RING_TIP, L.RING_PIP, L.RING_MCP);
                const pinkyUp = isFingerExtended(landmarks, L.PINKY_TIP, L.PINKY_PIP, L.PINKY_MCP);
                const thumbUp = isThumbExtended(landmarks);

                const indexCurled = isFingerCurled(landmarks, L.INDEX_TIP, L.INDEX_PIP);
                const middleCurled = isFingerCurled(landmarks, L.MIDDLE_TIP, L.MIDDLE_PIP);
                const ringCurled = isFingerCurled(landmarks, L.RING_TIP, L.RING_PIP);
                const pinkyCurled = isFingerCurled(landmarks, L.PINKY_TIP, L.PINKY_PIP);
                const thumbToIndexMcp = dist(landmarks[L.THUMB_TIP], landmarks[L.INDEX_MCP]);
                const thumbCurled = thumbToIndexMcp < 0.09;

                const pinchDist = dist(landmarks[L.THUMB_TIP], landmarks[L.INDEX_TIP]);
                const isPinching = pinchDist < CONFIG.pinchThreshold;

                const pointer = {
                    x: landmarks[L.INDEX_TIP].x,
                    y: landmarks[L.INDEX_TIP].y,
                };

                // 1. OK 手势 → 切换花草模式（不再清屏）
                if (isPinching && middleUp && ringUp && pinkyUp) {
                    return { gesture: 'flora', pointer };
                }

                // 2. 五指张开 → 换色
                if (thumbUp && indexUp && middleUp && ringUp && pinkyUp) {
                    return { gesture: 'cycle', pointer };
                }

                // 3. 捏合 → 抬笔
                if (isPinching && !middleUp && !ringUp && !pinkyUp) {
                    return { gesture: 'lift', pointer };
                }
                if (isPinching) {
                    return { gesture: 'lift', pointer };
                }

                // 4. 握拳 → 撤销
                const allCurled = indexCurled && middleCurled && ringCurled && pinkyCurled;
                const noneExtended = !indexUp && !middleUp && !ringUp && !pinkyUp;
                if (allCurled && noneExtended && (thumbCurled || !thumbUp)) {
                    return { gesture: 'undo', pointer };
                }

                // 5. 仅食指伸出 → 绘画
                if (indexUp && !middleUp && !ringUp && !pinkyUp) {
                    return { gesture: 'draw', pointer };
                }

                return { gesture: 'idle', pointer };
            }

            return { classify, L };
        })();

        // ============================================================
        //  笔划类
        // ============================================================
        class Stroke {
            constructor(color, baseWidth) {
                this.color = color;
                this.baseWidth = baseWidth;
                /** @type {{x:number, y:number, width:number}[]} */
                this.points = [];
            }
        }

        // ============================================================
        //  绘图引擎
        // ============================================================
        class DrawingEngine {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.strokes = [];
                this.currentStroke = null;
                this.currentColorIdx = 0;
                this.manualColor = null;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
            }

            get currentColor() {
                return this.manualColor || CONFIG.colors[this.currentColorIdx];
            }

            addPoint(x, y, speed) {
                if (!this.currentStroke) {
                    this.currentStroke = new Stroke(this.currentColor, CONFIG.baseStrokeWidth);
                }
                const width = this.calcWidth(speed);
                this.currentStroke.points.push({ x, y, width });
                this.renderLastSegment();
            }

            calcWidth(speed) {
                const cs = Math.max(0, Math.min(speed, CONFIG.maxSpeed));
                return Math.max(
                    CONFIG.minStrokeWidth,
                    Math.min(CONFIG.maxStrokeWidth,
                        CONFIG.baseStrokeWidth / (1 + cs * CONFIG.speedFactor)
                    )
                );
            }

            renderLastSegment() {
                const pts = this.currentStroke.points;
                if (pts.length < 2) return;
                const p0 = pts[pts.length - 2];
                const p1 = pts[pts.length - 1];
                this.ctx.strokeStyle = this.currentStroke.color;
                this.ctx.lineWidth = p1.width;
                this.ctx.globalAlpha = 0.92;
                this.ctx.beginPath();
                this.ctx.moveTo(p0.x, p0.y);
                this.ctx.lineTo(p1.x, p1.y);
                this.ctx.stroke();
                this.ctx.globalAlpha = 1;
            }

            endStroke() {
                if (this.currentStroke && this.currentStroke.points.length > 1) {
                    this.strokes.push(this.currentStroke);
                }
                this.currentStroke = null;
            }

            undoLastStroke() {
                this.currentStroke = null;
                if (this.strokes.length > 0) this.strokes.pop();
                this.redrawAll();
            }

            clearAll() {
                this.currentStroke = null;
                this.strokes = [];
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            cycleColor() {
                this.currentColorIdx = (this.currentColorIdx + 1) % CONFIG.colors.length;
                this.manualColor = null;
                this.endStroke();
            }

            setManualColor(hex) {
                this.manualColor = hex;
                this.endStroke();
            }

            redrawAll() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (const stroke of this.strokes) {
                    const pts = stroke.points;
                    if (pts.length < 2) continue;
                    this.ctx.strokeStyle = stroke.color;
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';
                    this.ctx.globalAlpha = 0.92;
                    for (let i = 1; i < pts.length; i++) {
                        this.ctx.lineWidth = pts[i].width;
                        this.ctx.beginPath();
                        this.ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
                        this.ctx.lineTo(pts[i].x, pts[i].y);
                        this.ctx.stroke();
                    }
                    this.ctx.globalAlpha = 1;
                }
            }

            exportImage(bgColor = '#0d0d0d') {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = this.canvas.width;
                tempCanvas.height = this.canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.fillStyle = bgColor;
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                tempCtx.drawImage(this.canvas, 0, 0);
                return tempCanvas.toDataURL('image/png');
            }
        }

        // ============================================================
        //  颜色工具：Hex → HSL
        // ============================================================
        function hexToHsl(hex) {
            hex = hex.replace(/^#/, '');
            const r = parseInt(hex.substring(0, 2), 16) / 255;
            const g = parseInt(hex.substring(2, 4), 16) / 255;
            const b = parseInt(hex.substring(4, 6), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        // ============================================================
        //  花草元素 — 单株植物
        // ============================================================
        class FloraElement {
            constructor() {
                this.alive = false;
                this.leaves = [];
                this.petalAngles = [];
            }

            reset(x, y, strokeColor) {
                this.alive = true;
                this.x = x;
                this.y = y;
                this.growth = 0;
                // 生长速度：1.8~4 秒长满（60fps: 0.005~0.012 per frame）
                this.growthSpeed = 0.005 + Math.random() * 0.012;
                this.stemHeight = FLORA_CONFIG.stemMin + Math.random() * (FLORA_CONFIG.stemMax - FLORA_CONFIG.stemMin);
                this.stemAngle = (Math.random() - 0.5) * 0.6;
                this.stemCurve = (Math.random() - 0.5) * 0.4;

                const hsl = hexToHsl(strokeColor);
                this.hasFlower = Math.random() < FLORA_CONFIG.flowerChance;
                this.flowerHue = (hsl.h + (Math.random() - 0.5) * 50 + 360) % 360;
                this.flowerSat = 55 + Math.random() * 35;
                this.flowerLight = 48 + Math.random() * 35;
                this.petalCount = FLORA_CONFIG.petalCountMin + Math.floor(Math.random() * (FLORA_CONFIG.petalCountMax - FLORA_CONFIG.petalCountMin + 1));
                this.petalRadius = FLORA_CONFIG.petalSizeMin + Math.random() * (FLORA_CONFIG.petalSizeMax - FLORA_CONFIG.petalSizeMin);

                const lc = FLORA_CONFIG.leafColors;
                this.leafColor = lc[Math.floor(Math.random() * lc.length)];

                this.leafCount = FLORA_CONFIG.leafCountMin + Math.floor(Math.random() * (FLORA_CONFIG.leafCountMax - FLORA_CONFIG.leafCountMin + 1));
                this.leaves = [];
                for (let i = 0; i < this.leafCount; i++) {
                    this.leaves.push({
                        t: 0.25 + (i / (this.leafCount + 1)) * 0.55,
                        angle: this.stemAngle + (i % 2 === 0 ? 1 : -1) * (0.45 + Math.random() * 0.45),
                        size: 2.5 + Math.random() * 5.5,
                    });
                }

                this.petalAngles = [];
                const baseOffset = Math.random() * Math.PI * 2;
                for (let i = 0; i < this.petalCount; i++) {
                    this.petalAngles.push(baseOffset + (i / this.petalCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.35);
                }

                this.isGrass = !this.hasFlower && Math.random() < FLORA_CONFIG.grassChance;
            }

            update(dt) {
                if (!this.alive) return;
                this.growth += this.growthSpeed;
                if (this.growth >= 1) {
                    this.growth = 1;
                }
            }

            render(ctx) {
                if (!this.alive || this.growth <= 0.01) return;

                const g = this.growth;
                // easeOutCubic
                const ease = 1 - Math.pow(1 - g, 3);
                const h = this.stemHeight * ease;
                const a = this.stemAngle;
                const endX = this.x + Math.sin(a) * h;
                const endY = this.y - Math.cos(a) * h;
                const cpX = this.x + Math.sin(a + this.stemCurve) * h * 0.55;
                const cpY = this.y - Math.cos(a + this.stemCurve) * h * 0.55;

                // --- 茎 ---
                ctx.save();
                ctx.strokeStyle = this.leafColor;
                ctx.lineWidth = Math.max(0.6, 1.6 * (1 - g * 0.25));
                ctx.lineCap = 'round';
                ctx.globalAlpha = Math.min(1, g * 2);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.stroke();
                ctx.restore();

                // --- 叶子 ---
                if (g > 0.2) {
                    const leafAlpha = Math.min(1, (g - 0.2) / 0.6);
                    for (const leaf of this.leaves) {
                        const lt = leaf.t;
                        const lx = this.x + Math.sin(a + this.stemCurve * lt * 2) * h * lt;
                        const ly = this.y - Math.cos(a + this.stemCurve * lt * 2) * h * lt;
                        const ls = leaf.size * ease;

                        ctx.save();
                        ctx.globalAlpha = leafAlpha * 0.85;
                        ctx.fillStyle = this.leafColor;
                        ctx.beginPath();
                        ctx.ellipse(lx, ly, ls, ls * 0.3, leaf.angle, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }

                // --- 花朵 ---
                if (this.hasFlower && g > 0.65) {
                    const bloom = Math.min(1, (g - 0.65) / 0.35);
                    const bloomEase = 1 - Math.pow(1 - bloom, 2);
                    const pr = this.petalRadius * bloomEase;
                    const px = endX;
                    const py = endY;

                    // 花瓣
                    for (const pa of this.petalAngles) {
                        const petalX = px + Math.cos(pa) * pr;
                        const petalY = py + Math.sin(pa) * pr;
                        ctx.save();
                        ctx.globalAlpha = bloomEase * 0.9;
                        ctx.fillStyle = `hsl(${this.flowerHue}, ${this.flowerSat}%, ${this.flowerLight}%)`;
                        ctx.beginPath();
                        ctx.arc(petalX, petalY, pr * 0.65, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }

                    // 花心
                    ctx.save();
                    ctx.globalAlpha = bloomEase;
                    ctx.fillStyle = '#FFE066';
                    ctx.shadowBlur = 3;
                    ctx.shadowColor = 'rgba(255,224,102,0.5)';
                    ctx.beginPath();
                    ctx.arc(px, py, pr * 0.38, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // --- 草叶（无花的小草） ---
                if (this.isGrass && g > 0.15) {
                    const blades = 2 + Math.floor(Math.random() * 2);
                    // Use deterministic seed based on position
                    const seed = (this.x * 7919 + this.y * 6271) % 1000 / 1000;
                    for (let i = 0; i < blades; i++) {
                        const bt = 0.4 + (i / blades) * 0.6;
                        const ba = a + (seed * 0.4 + i * 0.3 - 0.35);
                        const bx = this.x + Math.sin(ba) * h * bt;
                        const by = this.y - Math.cos(ba) * h * bt;

                        ctx.save();
                        ctx.globalAlpha = Math.min(1, (g - 0.15) / 0.5) * 0.7;
                        ctx.strokeStyle = this.leafColor;
                        ctx.lineWidth = 0.7;
                        ctx.beginPath();
                        ctx.moveTo(this.x + Math.sin(a) * h * (bt - 0.15), this.y - Math.cos(a) * h * (bt - 0.15));
                        ctx.quadraticCurveTo(bx, by, bx + Math.sin(ba) * 5, by - Math.cos(ba) * 5);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        // ============================================================
        //  花草系统 — 管理所有植物
        // ============================================================
        class FloraSystem {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.pool = [];
                for (let i = 0; i < FLORA_CONFIG.maxElements; i++) {
                    this.pool.push(new FloraElement());
                }
                this.nextSlot = 0;
            }

            spawn(x, y, color) {
                this.pool[this.nextSlot].reset(x, y, color);
                this.nextSlot = (this.nextSlot + 1) % this.pool.length;
            }

            spawnAlongSegment(x0, y0, x1, y1, color, density = FLORA_CONFIG.spawnDensity) {
                const d = Math.hypot(x1 - x0, y1 - y0);
                const steps = Math.max(1, Math.floor(d / density));
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    this.spawn(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t, color);
                }
            }

            update(dt) {
                for (const f of this.pool) {
                    if (f.alive) f.update(dt);
                }
            }

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (const f of this.pool) {
                    if (f.alive) f.render(this.ctx);
                }
            }

            clear() {
                for (const f of this.pool) f.alive = false;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // ============================================================
        //  粒子系统
        // ============================================================
        class Particle {
            constructor() {
                this.alive = false;
                this.x = 0; this.y = 0;
                this.vx = 0; this.vy = 0;
                this.life = 0; this.decay = 0;
                this.size = 0;
                this.hue = 0; this.saturation = 0; this.lightness = 0;
                this.hueSpin = 0;
            }

            reset(x, y, color) {
                this.alive = true;
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 3.5;
                this.vy = (Math.random() - 0.5) * 3.0 - 1.5;
                this.life = 1.0;
                this.decay = 0.012 + Math.random() * 0.035;
                this.size = 0.8 + Math.random() * 2.8;
                const baseHsl = hexToHsl(color);
                this.hue = (baseHsl.h + (Math.random() - 0.5) * 70 + 360) % 360;
                this.saturation = 60 + Math.random() * 35;
                this.lightness = 50 + Math.random() * 35;
                this.hueSpin = 0.8 + Math.random() * 3.0;
            }

            update() {
                if (!this.alive) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.012;
                this.life -= this.decay;
                this.size *= 0.998;
                this.hue = (this.hue + this.hueSpin) % 360;
                this.lightness += 0.2;
                if (this.life <= 0) this.alive = false;
            }
        }

        class ParticleSystem {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.pool = [];
                for (let i = 0; i < CONFIG.maxParticles; i++) {
                    this.pool.push(new Particle());
                }
                this.nextSlot = 0;
                this.globalHueShift = 0;
            }

            spawn(x, y, color, count = 2) {
                for (let i = 0; i < count; i++) {
                    this.pool[this.nextSlot].reset(x, y, color);
                    this.nextSlot = (this.nextSlot + 1) % this.pool.length;
                }
            }

            spawnAlongSegment(x0, y0, x1, y1, color, density = CONFIG.particleDensity) {
                const d = Math.hypot(x1 - x0, y1 - y0);
                const steps = Math.max(1, Math.floor(d / density));
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    this.spawn(
                        x0 + (x1 - x0) * t,
                        y0 + (y1 - y0) * t,
                        color, 1
                    );
                }
            }

            update() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.globalHueShift = (this.globalHueShift + 0.35) % 360;
                this.ctx.shadowBlur = 4;
                for (const p of this.pool) {
                    if (!p.alive) continue;
                    p.update();
                    if (!p.alive) continue;
                    const displayHue = (p.hue + this.globalHueShift) % 360;
                    const colorStr = `hsl(${displayHue}, ${p.saturation}%, ${p.lightness}%)`;
                    this.ctx.globalAlpha = p.life;
                    this.ctx.shadowColor = colorStr;
                    this.ctx.fillStyle = colorStr;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                this.ctx.globalAlpha = 1.0;
                this.ctx.shadowBlur = 0;
            }

            clear() {
                for (const p of this.pool) p.alive = false;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // ============================================================
        //  应用主控制器
        // ============================================================
        class AppController {
            constructor() {
                this.drawingEngine = new DrawingEngine(drawingCanvas, drawingCtx);
                this.particleSystem = new ParticleSystem(particleCanvas, particleCtx);
                this.floraSystem = new FloraSystem(floraCanvas, floraCtx);

                this.handLandmarker = null;
                this.cameraStarted = false;
                this.lastVideoTime = -1;
                this.currentGesture = 'idle';
                this.gestureFrameCounts = {};
                this.gestureTriggered = {};

                // 平滑插值（关键：让绘画在 60fps 丝滑运行）
                this.smoothX = 0;
                this.smoothY = 0;
                this.targetX = 0;
                this.targetY = 0;
                this.hasTarget = false;
                this.isDrawing = false;
                this.lastSmoothX = null;
                this.lastSmoothY = null;
                this.lastDetectSpeed = 0;
                this.smoothSpeed = 0;

                // 花草模式开关
                this.floraMode = false;

                // FPS
                this.frameCount = 0;
                this.lastFpsTime = performance.now();
                this.currentFps = 0;

                // 时间
                this.lastLoopTime = performance.now();

                this.loop = this.loop.bind(this);
            }

            async initMediaPipe() {
                loadingText.textContent = '正在加载 AI 视觉模型…';
                try {
                    const vision = await FilesetResolver.forVisionTasks(
                        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
                    );
                    this.handLandmarker = await HandLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',
                        },
                        runningMode: 'VIDEO',
                        numHands: 1,
                        minHandDetectionConfidence: 0.5,
                        minHandPresenceConfidence: 0.5,
                        minTrackingConfidence: 0.5,
                    });
                    return true;
                } catch (err) {
                    console.error('MediaPipe 初始化失败:', err);
                    loadingText.textContent = '模型加载失败，请检查网络连接后刷新重试。';
                    return false;
                }
            }

            async startCamera() {
                loadingText.textContent = '正在启动摄像头…';
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert('您的浏览器不支持摄像头访问。请使用 Chrome、Edge 或 Firefox 的最新版本。');
                    return false;
                }

                const startStream = async (constraints) => {
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    cameraVideo.srcObject = stream;
                    await cameraVideo.play();
                    this.cameraStarted = true;
                    await new Promise((resolve) => {
                        if (cameraVideo.readyState >= 2) resolve();
                        else cameraVideo.addEventListener('loadedmetadata', resolve, { once: true });
                    });
                    this.resize();
                    loadingOverlay.classList.add('hidden');
                    this.lastLoopTime = performance.now();
                    requestAnimationFrame(this.loop);
                    return true;
                };

                try {
                    return await startStream({
                        video: {
                            width: CONFIG.cameraWidth,
                            height: CONFIG.cameraHeight,
                            facingMode: 'user',
                        },
                    });
                } catch (err) {
                    try {
                        return await startStream({ video: { facingMode: 'user' } });
                    } catch (err2) {
                        loadingText.textContent = '摄像头启动失败。请确认已授权摄像头权限，然后刷新页面重试。';
                        console.error('摄像头启动失败:', err2);
                        return false;
                    }
                }
            }

            resize() {
                const containerW = appContainer.clientWidth;
                const containerH = appContainer.clientHeight;
                const videoW = cameraVideo.videoWidth || 640;
                const videoH = cameraVideo.videoHeight || 480;
                const videoAspect = videoW / videoH;
                const containerAspect = containerW / containerH;

                let drawW, drawH;
                if (containerAspect > videoAspect) {
                    drawH = containerH;
                    drawW = drawH * videoAspect;
                } else {
                    drawW = containerW;
                    drawH = drawW / videoAspect;
                }

                const offsetX = (containerW - drawW) / 2;
                const offsetY = (containerH - drawH) / 2;
                const sizeAndPos = (canvas, w, h) => {
                    canvas.width = w;
                    canvas.height = h;
                    canvas.style.width = w + 'px';
                    canvas.style.height = h + 'px';
                    canvas.style.left = offsetX + 'px';
                    canvas.style.top = offsetY + 'px';
                };

                sizeAndPos(videoDisplay, drawW, drawH);
                sizeAndPos(drawingCanvas, drawW, drawH);
                sizeAndPos(floraCanvas, drawW, drawH);
                sizeAndPos(particleCanvas, drawW, drawH);

                this.drawingEngine.redrawAll();
                this.drawSize = { w: drawW, h: drawH, offsetX, offsetY };
            }

            mapToCanvas(np) {
                if (!this.drawSize) return { x: 0, y: 0 };
                return { x: np.x * this.drawSize.w, y: np.y * this.drawSize.h };
            }

            /** 主循环 — 60fps 驱动，含平滑插值 */
            loop(timestamp) {
                requestAnimationFrame(this.loop);

                if (!this.cameraStarted || !this.handLandmarker) return;

                // 计算帧间隔
                const rawDt = Math.min((timestamp - this.lastLoopTime) / 1000, 0.1); // cap at 100ms
                this.lastLoopTime = timestamp;

                // FPS
                this.frameCount++;
                if (timestamp - this.lastFpsTime >= 1000) {
                    this.currentFps = Math.round(this.frameCount / ((timestamp - this.lastFpsTime) / 1000));
                    this.frameCount = 0;
                    this.lastFpsTime = timestamp;
                    fpsLabel.textContent = 'FPS: ' + this.currentFps;
                }

                // 渲染摄像头画面
                if (cameraVideo.readyState >= 2) {
                    const sz = this.drawSize;
                    videoDisplayCtx.drawImage(cameraVideo, 0, 0, sz.w, sz.h);
                }

                // 视频帧变化时 → 运行检测
                if (cameraVideo.readyState >= 2 && cameraVideo.currentTime !== this.lastVideoTime) {
                    this.lastVideoTime = cameraVideo.currentTime;
                    let results;
                    try {
                        results = this.handLandmarker.detectForVideo(cameraVideo, performance.now());
                    } catch (e) {
                        // skip
                    }
                    if (results) {
                        this.processDetection(results, rawDt);
                    }
                }

                // === 平滑插值绘制（每帧执行，无论是否有新检测） ===
                if (this.isDrawing && this.hasTarget) {
                    // 平滑因子：越低越丝滑（0.2-0.4 最佳）
                    const smoothFactor = 0.28;
                    this.smoothX += (this.targetX - this.smoothX) * smoothFactor;
                    this.smoothY += (this.targetY - this.smoothY) * smoothFactor;

                    if (this.lastSmoothX !== null) {
                        const de = this.drawingEngine;
                        // 平滑速度衰减
                        this.smoothSpeed += (this.lastDetectSpeed - this.smoothSpeed) * smoothFactor;

                        de.addPoint(this.smoothX, this.smoothY, this.smoothSpeed);

                        if (this.floraMode) {
                            this.floraSystem.spawnAlongSegment(
                                this.lastSmoothX, this.lastSmoothY,
                                this.smoothX, this.smoothY,
                                de.currentColor
                            );
                        } else {
                            this.particleSystem.spawnAlongSegment(
                                this.lastSmoothX, this.lastSmoothY,
                                this.smoothX, this.smoothY,
                                de.currentColor
                            );
                        }
                    }

                    this.lastSmoothX = this.smoothX;
                    this.lastSmoothY = this.smoothY;
                }

                // 更新粒子（始终运行，粒子自己会衰减）
                this.particleSystem.update();
                // 更新花草（始终运行，花草自己会生长完成）
                this.floraSystem.update(rawDt);
                this.floraSystem.render();
            }

            /** 处理 MediaPipe 检测结果（仅在视频帧变化时调用） */
            processDetection(results, dt) {
                if (!results.landmarks || results.landmarks.length === 0) {
                    this.onHandLost();
                    return;
                }

                const landmarks = results.landmarks[0];
                const classification = GestureClassifier.classify(landmarks);
                const gesture = classification.gesture;

                // 防抖
                for (const key of Object.keys(this.gestureFrameCounts)) {
                    if (key !== gesture) {
                        this.gestureFrameCounts[key] = 0;
                        this.gestureTriggered[key] = false;
                    }
                }
                if (!this.gestureFrameCounts[gesture]) this.gestureFrameCounts[gesture] = 0;
                this.gestureFrameCounts[gesture]++;

                if (this.currentGesture !== gesture) {
                    this.gestureTriggered[gesture] = false;
                    this.currentGesture = gesture;
                }

                if (this.gestureFrameCounts[gesture] < CONFIG.debounceFrames) {
                    return;
                }

                // ---- 执行手势 ----
                const pointer = this.mapToCanvas(classification.pointer);
                const de = this.drawingEngine;

                switch (gesture) {
                    case 'draw': {
                        // 设置目标位置（平滑插值用）
                        this.targetX = pointer.x;
                        this.targetY = pointer.y;
                        this.hasTarget = true;
                        this.isDrawing = true;

                        // 初始化平滑位置（首次进入绘画）
                        if (this.lastSmoothX === null) {
                            this.smoothX = pointer.x;
                            this.smoothY = pointer.y;
                            this.lastSmoothX = pointer.x;
                            this.lastSmoothY = pointer.y;
                        }

                        // 计算检测帧间的速度
                        if (this.lastDetectX !== undefined && this.lastDetectY !== undefined) {
                            const pxDist = Math.hypot(pointer.x - this.lastDetectX, pointer.y - this.lastDetectY);
                            this.lastDetectSpeed = dt > 0.001 ? pxDist / dt : 0;
                        }
                        this.lastDetectX = pointer.x;
                        this.lastDetectY = pointer.y;

                        const modeLabel = this.floraMode ? '花草模式 🌸' : '绘画中 ✨';
                        this.updateUI('draw', modeLabel);
                        break;
                    }

                    case 'lift':
                        de.endStroke();
                        this.isDrawing = false;
                        this.hasTarget = false;
                        this.lastSmoothX = null;
                        this.lastSmoothY = null;
                        this.updateUI('lift', '抬笔暂停 ✋');
                        break;

                    case 'flora':
                        if (!this.gestureTriggered.flora) {
                            this.floraMode = !this.floraMode;
                            this.gestureTriggered.flora = true;
                        }
                        this.isDrawing = false;
                        this.hasTarget = false;
                        this.lastSmoothX = null;
                        this.lastSmoothY = null;
                        de.endStroke();
                        const fmsg = this.floraMode ? '花草模式：开 🌸' : '花草模式：关';
                        this.updateUI('flora', fmsg);
                        break;

                    case 'cycle':
                        if (!this.gestureTriggered.cycle) {
                            de.cycleColor();
                            this.gestureTriggered.cycle = true;
                        }
                        this.isDrawing = false;
                        this.hasTarget = false;
                        this.lastSmoothX = null;
                        this.lastSmoothY = null;
                        this.updateUI('cycle', '颜色切换 → ' + de.currentColor);
                        break;

                    case 'undo':
                        if (!this.gestureTriggered.undo) {
                            de.undoLastStroke();
                            this.gestureTriggered.undo = true;
                        }
                        this.isDrawing = false;
                        this.hasTarget = false;
                        this.lastSmoothX = null;
                        this.lastSmoothY = null;
                        this.updateUI('undo', '撤销一笔 ↩');
                        break;

                    default:
                        de.endStroke();
                        this.isDrawing = false;
                        this.hasTarget = false;
                        this.lastSmoothX = null;
                        this.lastSmoothY = null;
                        this.updateUI('idle', '伸出食指开始绘画 ☝️');
                        break;
                }
            }

            onHandLost() {
                this.drawingEngine.endStroke();
                this.isDrawing = false;
                this.hasTarget = false;
                this.lastSmoothX = null;
                this.lastSmoothY = null;
                this.gestureFrameCounts = {};
                this.gestureTriggered = {};
                this.currentGesture = 'idle';
                this.updateUI('idle', '未检测到手 🖐️');
            }

            updateUI(gesture, statusText) {
                gestureLabel.textContent = statusText;

                const de = this.drawingEngine;
                const color = de.currentColor;
                colorDot.style.backgroundColor = color;
                colorLabel.textContent = color;

                if (this.floraMode) {
                    floraIndicator.textContent = '🌸 花草';
                    floraIndicator.className = 'flora-indicator flora-on';
                } else {
                    floraIndicator.textContent = '🌿 普通';
                    floraIndicator.className = 'flora-indicator flora-off';
                }

                if (colorPicker.value !== color) {
                    colorPicker.value = color;
                }

                gestureHintSpans.forEach(span => {
                    const g = span.dataset.gesture;
                    span.classList.toggle('active', g === gesture);
                });
            }
        }

        // ============================================================
        //  UI 事件绑定
        // ============================================================
        const app = new AppController();

        document.getElementById('clear-btn').addEventListener('click', () => {
            app.drawingEngine.clearAll();
            app.particleSystem.clear();
            app.floraSystem.clear();
            app.updateUI('clear', '画布已清除 🧹');
        });

        document.getElementById('undo-btn').addEventListener('click', () => {
            app.drawingEngine.undoLastStroke();
            app.updateUI('undo', '撤销一笔 ↩');
        });

        document.getElementById('save-btn').addEventListener('click', () => {
            const dataUrl = app.drawingEngine.exportImage('#0d0d0d');
            const link = document.createElement('a');
            link.download = 'air-draw-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.png';
            link.href = dataUrl;
            link.click();
            app.updateUI(app.currentGesture, '图片已保存 💾');
        });

        colorPicker.addEventListener('input', () => {
            app.drawingEngine.setManualColor(colorPicker.value);
            app.updateUI(app.currentGesture, '手动选色: ' + colorPicker.value);
        });

        document.getElementById('camera-btn').addEventListener('click', async () => {
            const btn = document.getElementById('camera-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 启动中…';
            const ok = await app.startCamera();
            if (!ok) {
                btn.disabled = false;
                btn.textContent = '📷 启动摄像头（重试）';
                return;
            }
            btn.textContent = '📷 摄像头运行中';
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
        });

        window.addEventListener('resize', () => {
            if (app.cameraStarted) app.resize();
        });

        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'c':
                    app.drawingEngine.clearAll();
                    app.particleSystem.clear();
                    app.floraSystem.clear();
                    app.updateUI('clear', '画布已清除 🧹 [快捷键]');
                    break;
                case 'z':
                    app.drawingEngine.undoLastStroke();
                    app.updateUI('undo', '撤销一笔 ↩ [快捷键]');
                    break;
                case 's':
                    const dataUrl = app.drawingEngine.exportImage('#0d0d0d');
                    const link = document.createElement('a');
                    link.download = 'air-draw-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.png';
                    link.href = dataUrl;
                    link.click();
                    break;
                case 'f':
                    app.floraMode = !app.floraMode;
                    const fmsg = app.floraMode ? '花草模式：开 🌸' : '花草模式：关';
                    app.updateUI('flora', fmsg);
                    break;
            }
        });

        // ============================================================
        //  启动流程
        // ============================================================
        (async function bootstrap() {
            if (window.location.protocol === 'file:') {
                loadingOverlay.querySelector('.spinner').style.display = 'none';
                loadingText.innerHTML = `
                    <div style="font-size:1.8rem;margin-bottom:12px;">⚠️ 检测到直接打开文件</div>
                    <div style="color:#ff6b6b;margin-bottom:20px;">摄像头与 AI 模型需要本地服务器环境</div>
                    <div style="background:#1a1a2e;border-radius:10px;padding:16px;text-align:left;line-height:1.8;font-size:0.95rem;max-width:420px;">
                        <div style="color:#6c5ce7;font-weight:700;margin-bottom:8px;">👉 请按以下步骤操作：</div>
                        <div>1️⃣ 找到 <b>start-server.bat</b> 文件</div>
                        <div>2️⃣ <b>双击运行</b>，会自动弹出浏览器</div>
                        <div>3️⃣ 访问 <span style="color:#00ce76;">http://localhost:8000/air-draw.html</span></div>
                    </div>
                    <div style="margin-top:16px;font-size:0.8rem;color:#888;">
                        📁 文件位置：ppt制作 文件夹 → start-server.bat
                    </div>
                `;
                loadingText.style.maxWidth = '460px';
                loadingText.style.textAlign = 'center';
                return;
            }

            const mediaPipeReady = app.initMediaPipe().catch(() => false);
            loadingText.textContent = '模型加载中，请稍候…';
            const mpOk = await mediaPipeReady;
            if (mpOk) {
                loadingText.textContent = '模型就绪！点击 "📷 启动摄像头" 开始';
            } else {
                loadingText.textContent = '模型加载失败，请检查网络后刷新重试';
            }
        })();

        console.log('🚀 Air Draw — 手势隔空作画 v2');
        console.log('  手势说明：');
        console.log('    ☝️  伸出食指 → 绘画');
        console.log('    🤏  拇指+食指捏合 → 抬笔暂停');
        console.log('    👌  OK手势 → 切换花草/普通模式');
        console.log('    🖐️  五指张开 → 切换颜色');
        console.log('    ✊  握拳 → 撤销一笔');
        console.log('  快捷键：C=清空 Z=撤销 S=保存 F=切换花草模式');
    </script>
</body>
</html>
